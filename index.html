<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ult. Fighter">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <title>Ultimate Fighter - MMA Promoter</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            overflow: hidden; 
        }
        .glass-panel { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        .modal-overlay { 
            background: rgba(2, 6, 23, 0.85); 
            backdrop-filter: blur(5px); 
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker berhasil didaftarkan pada scope:', registration.scope);
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('Update baru tersedia!');
                                    window.location.reload(); 
                                }
                            });
                        });
                    })
                    .catch(err => console.log('Pendaftaran ServiceWorker gagal: ', err));
            });
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const WEIGHT_CLASSES = ['Ringan', 'Menengah', 'Berat'];
        const FIGHT_STYLES = ['Striker', 'Wrestler', 'BJJ', 'Kickboxer', 'Balanced', 'Muay Thai'];
        const COUNTRIES = ['Indonesia', 'USA', 'Brazil', 'Russia', 'UK', 'Japan', 'Mexico', 'Australia', 'Nigeria', 'France'];
        
        const FIRST_NAMES = ['Budi', 'Agus', 'John', 'Mike', 'Ivan', 'Alex', 'Jose', 'Kenji', 'Tom', 'David', 'Anderson', 'Khabib', 'Conor', 'Israel', 'Kamaru'];
        const LAST_NAMES = ['Santoso', 'Wijaya', 'Smith', 'Johnson', 'Ivanov', 'Silva', 'Gomez', 'Sato', 'Hardy', 'Gane', 'Nurmagomedov', 'McGregor', 'Adesanya', 'Usman'];
        const NICKNAMES = ['The Lion', 'Bones', 'Iron', 'The Assassin', 'Pitbull', 'Flash', 'The Eagle', 'The Notorious', 'Rumble', 'Magic', 'Predator'];

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const randomItem = (arr) => arr[randomInt(0, arr.length - 1)];
        
        const calculateAge = (dob, currentYear) => currentYear - parseInt(dob.split('-')[0]);
        const calculateOvr = (stats) => Math.round((stats.striking + stats.grappling + stats.stamina + stats.power) / 4);
        
        const getOvrColor = (ovr) => {
            if(ovr >= 85) return 'text-amber-400';
            if(ovr >= 75) return 'text-blue-400';
            if(ovr >= 65) return 'text-emerald-400';
            return 'text-slate-400';
        };

        const getInitials = (first, last) => `${first.charAt(0)}${last.charAt(0)}`.toUpperCase();

        const getNextDate = (y, w, add) => {
            let newW = w + add;
            let newY = y;
            while(newW > 52) {
                newW -= 52;
                newY += 1;
            }
            return { year: newY, week: newW };
        };

        const generateFighter = (weightClass, isRandom, customData, currentYear) => {
            const id = generateId();
            if (isRandom) {
                const birthYear = currentYear - 18; 
                return {
                    id,
                    firstName: randomItem(FIRST_NAMES),
                    lastName: randomItem(LAST_NAMES),
                    nickname: randomItem(NICKNAMES),
                    country: randomItem(COUNTRIES),
                    dob: `${birthYear}-01-01`,
                    weightClass: weightClass,
                    style: randomItem(FIGHT_STYLES),
                    stats: {
                        striking: randomInt(55, 85),
                        grappling: randomInt(55, 85),
                        stamina: randomInt(60, 85),
                        power: randomInt(55, 90)
                    },
                    record: { wins: 0, losses: 0, draws: 0 },
                    elo: 1000, // INITIAL ELO
                    isRetired: false,
                    titleWins: 0,
                    titleDefenses: 0,
                    currentStreak: 0,
                    history: [],
                    badges: []
                };
            }
            return {
                id,
                ...customData,
                record: { wins: 0, losses: 0, draws: 0 },
                elo: 1000, // INITIAL ELO
                isRetired: false,
                titleWins: 0,
                titleDefenses: 0,
                currentStreak: 0,
                history: [],
                badges: []
            };
        };

        const simulateMatch = (f1, f2, isTitleFight) => {
            const score1 = (f1.stats.striking * 0.35) + (f1.stats.grappling * 0.25) + (f1.stats.stamina * 0.2) + (f1.stats.power * 0.2) + randomInt(0, 30);
            const score2 = (f2.stats.striking * 0.35) + (f2.stats.grappling * 0.25) + (f2.stats.stamina * 0.2) + (f2.stats.power * 0.2) + randomInt(0, 30);
            
            let winnerId, loserId, method, round, time;
            const maxRounds = isTitleFight ? 5 : 3;
            
            round = randomInt(1, maxRounds);
            time = `${randomInt(0, 4)}:${randomInt(10, 59).toString().padStart(2, '0')}`;

            if (score1 > score2 + 20) {
                winnerId = f1.id; loserId = f2.id;
                method = f1.stats.power > f1.stats.grappling ? 'KO/TKO' : 'Submission';
            } else if (score2 > score1 + 20) {
                winnerId = f2.id; loserId = f1.id;
                method = f2.stats.power > f2.stats.grappling ? 'KO/TKO' : 'Submission';
            } else {
                winnerId = score1 > score2 ? f1.id : f2.id;
                loserId = score1 > score2 ? f2.id : f1.id;
                
                if (randomInt(0, 100) > 85) {
                    const winner = winnerId === f1.id ? f1 : f2;
                    method = winner.stats.power > winner.stats.grappling ? 'TKO' : 'Submission';
                } else {
                    const decisions = ['Decision (Unanimous)', 'Decision (Split)', 'Decision (Majority)'];
                    method = randomItem(decisions);
                    round = maxRounds;
                    time = '5:00';
                }
            }

            return { winnerId, loserId, method, round, time };
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('roster');
            
            const [gameState, setGameState] = useState(() => {
                const savedData = localStorage.getItem('uf_save_data');
                if (savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        // Patch: Pastikan petarung dari save lama mendapatkan field ELO
                        if (parsed.fighters) {
                            parsed.fighters = parsed.fighters.map(f => ({ ...f, elo: f.elo || 1000 }));
                        }
                        return { ...parsed, championshipHistory: parsed.championshipHistory || [] };
                    } catch (e) {
                        console.error('Data tersimpan korup. Memulai ulang permainan baru.', e);
                    }
                }
                return {
                    currentYear: 2026,
                    currentWeek: 1,
                    ppvCount: 1,
                    fighters: [],
                    events: [],
                    history: [],
                    championshipHistory: [],
                    champions: { 'Ringan': null, 'Menengah': null, 'Berat': null },
                    rankings: { 'Ringan': [], 'Menengah': [], 'Berat': [] } 
                };
            });

            const [modal, setModal] = useState(null); 
            const [toast, setToast] = useState(null);

            useEffect(() => {
                localStorage.setItem('uf_save_data', JSON.stringify(gameState));
            }, [gameState]);

            useEffect(() => {
                lucide.createIcons();
            }, [activeTab, modal, gameState, toast]);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const addFighter = (fighter) => {
                setGameState(prev => ({ ...prev, fighters: [...prev.fighters, fighter] }));
                showToast('Fighter berhasil ditambahkan!');
                setModal(null);
            };

            const editFighter = (updatedFighter) => {
                setGameState(prev => ({
                    ...prev,
                    fighters: prev.fighters.map(f => f.id === updatedFighter.id ? updatedFighter : f)
                }));
                showToast('Data fighter berhasil diperbarui!');
                setModal({ type: 'fighterDetail', data: updatedFighter });
            };

            const retireFighter = (fighterId) => {
                let isDeleted = false;
                setGameState(prev => {
                    const targetFighter = prev.fighters.find(f => f.id === fighterId);
                    const totalFights = targetFighter.history.length;
                    
                    let newChamps = { ...prev.champions };
                    let newRanks = { ...prev.rankings };

                    if (newChamps[targetFighter.weightClass] === fighterId) {
                        newChamps[targetFighter.weightClass] = null;
                    }
                    newRanks[targetFighter.weightClass] = newRanks[targetFighter.weightClass].filter(id => id !== fighterId);

                    let newFighters;
                    if (totalFights < 5) {
                        newFighters = prev.fighters.filter(f => f.id !== fighterId);
                        isDeleted = true;
                    } else {
                        newFighters = prev.fighters.map(f => f.id === fighterId ? { ...f, isRetired: true } : f);
                    }

                    return { ...prev, fighters: newFighters, champions: newChamps, rankings: newRanks };
                });
                
                setTimeout(() => {
                    if(isDeleted) showToast('Fighter dihapus permanen (< 5 laga).', 'success');
                    else showToast('Fighter resmi gantung sarung tangan.', 'success');
                }, 100);
                
                setModal(null);
            };

            const addEvent = (eventData) => {
                // Notifikasi error bentrok dihapus, karena form AddEventModal kini mengatur waktunya secara otomatis

                if (eventData.type === 'Turnamen') {
                    const wc = eventData.weightClass;
                    const scheduledFighterIds = gameState.events.flatMap(e => e.matches.flatMap(m => [m.f1Id, m.f2Id]));
                    const availableFighters = gameState.fighters.filter(f => {
                        if (f.isRetired || f.weightClass !== wc || scheduledFighterIds.includes(f.id)) return false;
                        const totalFights = f.record.wins + f.record.losses + f.record.draws;
                        return totalFights <= 3;
                    });
                    
                    let newFightersToAdd = [];
                    let tournamentParticipants = [...availableFighters];
                    
                    // Jika peserta kurang, isi kekurangannya dengan petarung acak (Rookie)
                    if (tournamentParticipants.length < 16) {
                        const needed = 16 - tournamentParticipants.length;
                        for (let i = 0; i < needed; i++) {
                            const newFighter = generateFighter(wc, true, null, gameState.currentYear);
                            newFightersToAdd.push(newFighter);
                            tournamentParticipants.push(newFighter);
                        }
                    }
                    
                    // Acak urutan petarung agar bagan turnamen fair
                    const shuffled = tournamentParticipants.sort(() => 0.5 - Math.random()).slice(0, 16);
                    const matches = [];
                    // Masukkan 8 pertandingan awal (16 Besar) untuk ditampilkan di Card Jadwal
                    for(let i = 0; i < 8; i++) {
                        matches.push({
                            id: generateId(),
                            weightClass: wc,
                            isTitleFight: false,
                            f1Id: shuffled[i*2].id,
                            f2Id: shuffled[i*2+1].id,
                            result: null,
                            isTournamentMatch: true
                        });
                    }
                    
                    const newEvent = {
                        id: generateId(),
                        type: 'Turnamen',
                        name: `Turnamen Kejuaraan ${wc}`,
                        week: eventData.week,
                        year: eventData.year,
                        matches: matches,
                        tournament: { weightClass: wc }
                    };
                    
                    // Update state gabungan untuk Event baru dan Roster Petarung baru
                    setGameState(prev => ({ 
                        ...prev, 
                        fighters: [...prev.fighters, ...newFightersToAdd],
                        events: [...prev.events, newEvent] 
                    }));
                    setModal(null);
                    showToast(`Turnamen 16 Besar dijadwalkan! ${newFightersToAdd.length > 0 ? `(${newFightersToAdd.length} petarung acak ditambahkan otomatis)` : ''}`);
                } else {
                    const newEvent = { id: generateId(), ...eventData, matches: [], name: '' };
                    setGameState(prev => ({ ...prev, events: [...prev.events, newEvent] }));
                    setModal(null);
                    showToast('Jadwal acara berhasil dibuat!');
                }
            };

            const deleteEvent = (eventId) => {
                setGameState(prev => ({ ...prev, events: prev.events.filter(e => e.id !== eventId) }));
                showToast('Acara dibatalkan.', 'error');
            };

            const addMatch = (eventId, matchData) => {
                setGameState(prev => {
                    const newEvents = [...prev.events];
                    const eventIndex = newEvents.findIndex(e => e.id === eventId);
                    const evt = newEvents[eventIndex];
                    
                    const newMatch = { id: generateId(), ...matchData, result: null };
                    evt.matches.push(newMatch);

                    if (evt.matches.length === 1) {
                        const f1 = prev.fighters.find(f => f.id === matchData.f1Id);
                        const f2 = prev.fighters.find(f => f.id === matchData.f2Id);
                        if (evt.type === 'Fight Week') {
                            evt.name = `Fight Week ${evt.week} ${evt.year} ${f1.lastName} vs ${f2.lastName}`;
                        } else {
                            evt.name = `Fighter Ultimate ${prev.ppvCount} ${f1.lastName} vs ${f2.lastName}`;
                        }
                    }
                    return { ...prev, events: newEvents };
                });
                setModal(null);
                showToast('Pertandingan berhasil masuk card!');
            };

            const autoFillEvent = (eventId) => {
                setGameState(prev => {
                    const newEvents = [...prev.events];
                    const eventIndex = newEvents.findIndex(e => e.id === eventId);
                    const evt = newEvents[eventIndex];

                    if (evt.type === 'Turnamen') return prev; // Turnamen sudah diurus otomatis

                    const scheduledFighterIds = newEvents.flatMap(e => e.matches.flatMap(m => [m.f1Id, m.f2Id]));
                    const championIds = Object.values(prev.champions); // Ambil semua ID juara bertahan
                    
                    // Filter: Tidak pensiun, belum ada jadwal, DAN BUKAN juara bertahan
                    let availableFighters = prev.fighters.filter(f => 
                        !f.isRetired && 
                        !scheduledFighterIds.includes(f.id) && 
                        !championIds.includes(f.id)
                    );

                    // Acak urutan awal petarung
                    availableFighters = availableFighters.sort(() => 0.5 - Math.random());

                    let newMatches = [];
                    let matchesNeeded = 5 - evt.matches.length; // Maksimal 5 pertandingan per acara

                    if (matchesNeeded <= 0) {
                        setTimeout(() => showToast('Card pertandingan sudah penuh (Maks 5 laga)!', 'error'), 10);
                        return prev;
                    }

                    while (availableFighters.length >= 2 && matchesNeeded > 0) {
                        const f1 = availableFighters[0];
                        availableFighters.splice(0, 1);

                        let opponents = availableFighters.filter(f => f.weightClass === f1.weightClass);
                        if (opponents.length === 0) continue;

                        opponents.sort((a, b) => {
                            const h2hA = f1.history.filter(h => h.opponentId === a.id).length;
                            const h2hB = f1.history.filter(h => h.opponentId === b.id).length;
                            if (h2hA === h2hB) return 0.5 - Math.random();
                            return h2hA - h2hB;
                        });

                        const f2 = opponents[0];
                        const f2Index = availableFighters.findIndex(f => f.id === f2.id);
                        availableFighters.splice(f2Index, 1);

                        newMatches.push({
                            id: generateId(),
                            weightClass: f1.weightClass,
                            isTitleFight: false,
                            f1Id: f1.id,
                            f2Id: f2.id,
                            result: null
                        });
                        matchesNeeded--;
                    }

                    if (newMatches.length === 0) {
                         setTimeout(() => showToast('Tidak ada pasangan petarung yang tersedia (kelas berat tidak cocok)!', 'error'), 10);
                         return prev;
                    }

                    evt.matches = [...evt.matches, ...newMatches];

                    if (evt.matches.length === newMatches.length && evt.matches.length > 0) {
                        const f1 = prev.fighters.find(f => f.id === evt.matches[0].f1Id);
                        const f2 = prev.fighters.find(f => f.id === evt.matches[0].f2Id);
                        if (evt.type === 'Fight Week') {
                            evt.name = `Fight Week ${evt.week} ${evt.year} ${f1.lastName} vs ${f2.lastName}`;
                        } else {
                            evt.name = `Fighter Ultimate ${prev.ppvCount} ${f1.lastName} vs ${f2.lastName}`;
                        }
                    }

                    setTimeout(() => showToast(`${newMatches.length} Pertandingan acak ditambahkan!`), 10);
                    return { ...prev, events: newEvents };
                });
            };

            const simulateEvent = (eventId) => {
                let simulatedEvt = null;
                setGameState(prev => {
                    const eventIndex = prev.events.findIndex(e => e.id === eventId);
                    const evt = prev.events[eventIndex];
                    
                    const pendingEarlier = prev.events.some(e => e.id !== eventId && (e.year < evt.year || (e.year === evt.year && e.week < evt.week)));
                    if (pendingEarlier) {
                        showToast("Gagal: Ada acara yang dijadwalkan lebih awal!", 'error');
                        return prev;
                    }

                    if (evt.matches.length === 0) {
                        showToast("Gagal: Card pertandingan masih kosong!", 'error');
                        return prev;
                    }

                    let currentFighters = JSON.parse(JSON.stringify(prev.fighters));
                    let currentChamps = { ...prev.champions };
                    let currentRanks = { ...prev.rankings };
                    let currentChampionshipHistory = [...(prev.championshipHistory || [])];

                    const getMethodMultiplier = (method, round) => {
                        if (method.includes('KO') || method.includes('Submission')) {
                            return round <= 2 ? 1.5 : 1.3;
                        }
                        if (method === 'Decision (Unanimous)') return 1.0;
                        return 0.8; // Split atau Majority
                    };

                    const executeSingleMatch = (matchData, stageName) => {
                        const f1 = currentFighters.find(f => f.id === matchData.f1Id);
                        const f2 = currentFighters.find(f => f.id === matchData.f2Id);
                        
                        const result = matchData.manualResult ? matchData.manualResult : simulateMatch(f1, f2, matchData.isTitleFight);
                        
                        const winner = result.winnerId === f1.id ? f1 : f2;
                        const loser = result.winnerId === f1.id ? f2 : f1;

                        winner.record.wins += 1;
                        winner.currentStreak += 1;
                        loser.record.losses += 1;
                        loser.currentStreak = 0;

                        // --- KALKULASI ELO RATING ---
                        const basePoints = matchData.isTitleFight ? 40 : 32;
                        const multiplier = getMethodMultiplier(result.method, result.round);
                        const opponentBonus = Math.round(loser.elo * 0.02);
                        const pointsGained = Math.round((basePoints * multiplier) + opponentBonus);

                        winner.elo += pointsGained;
                        loser.elo = Math.max(100, loser.elo - pointsGained); // Jangan sampai minus

                        // --- FITUR PERKEMBANGAN ATRIBUT DINAMIS ---
                        const applyStatChange = (stats, isWin) => {
                            const newStats = { ...stats };
                            ['striking', 'grappling', 'stamina', 'power'].forEach(attr => {
                                if (isWin) {
                                    const increase = Math.max(1, Math.round(stats[attr] * 0.02));
                                    newStats[attr] = Math.min(100, stats[attr] + increase);
                                } else {
                                    const decrease = Math.max(1, Math.round(stats[attr] * 0.01));
                                    newStats[attr] = Math.max(1, stats[attr] - decrease);
                                }
                            });
                            return newStats;
                        };

                        winner.stats = applyStatChange(winner.stats, true);
                        loser.stats = applyStatChange(loser.stats, false);

                        if (matchData.isTitleFight) {
                            if (currentChamps[matchData.weightClass] === winner.id) {
                                winner.titleDefenses += 1;
                                const lastEntryIndex = currentChampionshipHistory.map(e => e.weightClass).lastIndexOf(matchData.weightClass);
                                if (lastEntryIndex !== -1 && currentChampionshipHistory[lastEntryIndex].championId === winner.id) {
                                    currentChampionshipHistory[lastEntryIndex].defenses += 1;
                                }
                            } else {
                                winner.titleWins += 1;
                                currentChampionshipHistory.push({
                                    id: generateId(),
                                    weightClass: matchData.weightClass,
                                    championId: winner.id,
                                    wonFromId: currentChamps[matchData.weightClass],
                                    date: `W${evt.week}-${evt.year}`,
                                    eventName: evt.name,
                                    defenses: 0
                                });
                                
                                // Juara Lama Tergeser ke Rank #1
                                const oldChampId = currentChamps[matchData.weightClass];
                                currentChamps[matchData.weightClass] = winner.id;
                                if (oldChampId) {
                                    let tempRanks = [...(currentRanks[matchData.weightClass] || [])];
                                    tempRanks = tempRanks.filter(id => id !== winner.id); // Hapus juara baru dari ranks
                                    tempRanks.unshift(oldChampId); // Masukkan mantan juara ke posisi teratas
                                    currentRanks[matchData.weightClass] = tempRanks;
                                }
                            }
                        } else {
                            // --- ATURAN PENGAMBILALIHAN (TAKEOVER) KHUSUS TOP 5 ---
                            const wc = matchData.weightClass;
                            let tempRanks = [...(currentRanks[wc] || [])];
                            const wIdx = tempRanks.indexOf(winner.id);
                            const lIdx = tempRanks.indexOf(loser.id);

                            const lIsTop5 = lIdx !== -1 && lIdx < 5; // Apakah yang kalah ada di Top 5?
                            const wIsOutsideTop5 = wIdx === -1 || wIdx >= 5; // Apakah yang menang dari luar Top 5?

                            if (lIsTop5 && wIsOutsideTop5) {
                                // Pemenang luar Top 5 merampas takhta petarung Top 5
                                tempRanks[lIdx] = winner.id;
                                if (wIdx !== -1) tempRanks[wIdx] = loser.id; // Tukar posisi jika pemenang dari Rank 6-10
                            } else if (lIdx !== -1 && wIdx !== -1 && wIdx > lIdx && wIdx < 5) {
                                // Sesama Top 5 bertarung, petarung posisi lebih rendah merebut takhta
                                tempRanks[lIdx] = winner.id;
                                tempRanks[wIdx] = loser.id;
                            }
                            currentRanks[wc] = tempRanks;
                        }

                        const fightDesc = `${evt.name}${stageName ? ` (${stageName})` : ''} - ${result.method} (R${result.round} - ${result.time})`;
                        winner.history.push({ date: `W${evt.week}-${evt.year}`, opponentId: loser.id, opponentName: loser.lastName, result: 'W', detail: fightDesc, momentumPoints: 0 }); // momentumPoints tidak dipakai lagi, tapi biarkan array seragam
                        loser.history.push({ date: `W${evt.week}-${evt.year}`, opponentId: winner.id, opponentName: winner.lastName, result: 'L', detail: fightDesc, momentumPoints: 0 });

                        return { processedMatch: { ...matchData, result, stageName }, winnerId: winner.id };
                    };

                    let simulatedMatches = [];

                    if (evt.type === 'Turnamen') {
                        let r16Winners = [];
                        for (const m of evt.matches) {
                            const res = executeSingleMatch(m, '16 Besar');
                            simulatedMatches.push(res.processedMatch);
                            r16Winners.push(res.winnerId);
                        }

                        let qfWinners = [];
                        for (let i = 0; i < 4; i++) {
                            const m = { id: generateId(), weightClass: evt.tournament.weightClass, isTitleFight: false, f1Id: r16Winners[i*2], f2Id: r16Winners[i*2+1] };
                            const res = executeSingleMatch(m, 'Perempat Final');
                            simulatedMatches.push(res.processedMatch);
                            qfWinners.push(res.winnerId);
                        }

                        let sfWinners = [];
                        for (let i = 0; i < 2; i++) {
                            const m = { id: generateId(), weightClass: evt.tournament.weightClass, isTitleFight: false, f1Id: qfWinners[i*2], f2Id: qfWinners[i*2+1] };
                            const res = executeSingleMatch(m, 'Semi Final');
                            simulatedMatches.push(res.processedMatch);
                            sfWinners.push(res.winnerId);
                        }

                        const finalMatch = { id: generateId(), weightClass: evt.tournament.weightClass, isTitleFight: false, f1Id: sfWinners[0], f2Id: sfWinners[1] };
                        const finalRes = executeSingleMatch(finalMatch, 'Grand Final');
                        simulatedMatches.push(finalRes.processedMatch);

                        const champFighter = currentFighters.find(f => f.id === finalRes.winnerId);
                        if (champFighter) {
                            champFighter.badges = champFighter.badges || [];
                            if (!champFighter.badges.includes('Wonderkid')) {
                                champFighter.badges.push('Wonderkid');
                            }
                        }
                    } else {
                        for (const m of evt.matches) {
                            const res = executeSingleMatch(m, null);
                            simulatedMatches.push(res.processedMatch);
                        }
                    }

                    // --- FITUR PENSIUN OTOMATIS (PHK PAKSA TERBARU) ---
                    simulatedMatches.forEach(match => {
                        const f1 = currentFighters.find(f => f.id === match.f1Id);
                        const f2 = currentFighters.find(f => f.id === match.f2Id);
                        
                        [f1, f2].forEach(fighter => {
                            if (!fighter || fighter.isRetired) return;
                            
                            const wins = fighter.record.wins;
                            const losses = fighter.record.losses;
                            const totalFights = wins + losses + fighter.record.draws;
                            let shouldRetire = false;

                            // Syarat 8 kali kalah beruntun
                            const last8 = fighter.history.slice(-8);
                            if (last8.length === 8 && last8.every(h => h.result === 'L')) shouldRetire = true;

                            // Syarat batas rasio kekalahan awal
                            if (totalFights <= 10 && losses >= 5) shouldRetire = true;
                            else if (totalFights <= 15 && losses >= 8) shouldRetire = true;
                            else if (totalFights <= 20 && losses >= 10) shouldRetire = true;

                            if (shouldRetire) {
                                fighter.isRetired = true;
                                if (currentChamps[fighter.weightClass] === fighter.id) {
                                    currentChamps[fighter.weightClass] = null;
                                }
                            }
                        });
                    });

                    // --- REBUILD RANKINGS (HYBRID: TAKEOVER TOP 5 + ELO TOP 6-10) ---
                    let updatedRanks = { 'Ringan': [], 'Menengah': [], 'Berat': [] };
                    WEIGHT_CLASSES.forEach(wc => {
                        let currentWcRanks = currentRanks[wc] || [];
                        let top5 = currentWcRanks.slice(0, 5); // Amankan 5 Teratas hasil Takeover

                        // 1. Aturan Dropout: Tendang anggota Top 5 jika kalah 3x beruntun
                        top5 = top5.filter(id => {
                            const f = currentFighters.find(fighter => fighter.id === id);
                            if (!f || f.isRetired || f.id === currentChamps[wc]) return false;
                            
                            const last3 = f.history.slice(-3);
                            const is3Losses = last3.length === 3 && last3.every(h => h.result === 'L');
                            return !is3Losses;
                        });

                        // 2. Kumpulkan petarung yang memenuhi syarat untuk mengisi slot kosong (Minimal 5 laga, 3 menang)
                        let eligiblePool = currentFighters.filter(f => {
                            if (f.weightClass !== wc || f.isRetired || f.id === currentChamps[wc]) return false;
                            if (top5.includes(f.id)) return false; // Jangan hitung yang sudah aman di Top 5
                            
                            const totalFights = f.record.wins + f.record.losses + f.record.draws;
                            if (totalFights < 5 || f.record.wins < 3) return false;
                            
                            return true;
                        });

                        // 3. Urutkan sisanya murni berdasarkan ELO tertinggi
                        eligiblePool.sort((a, b) => b.elo - a.elo);

                        // 4. Isi Kekosongan Top 5 (Jika ada yang didepak/jadi juara/pensiun)
                        while (top5.length < 5 && eligiblePool.length > 0) {
                            const nextTopFighter = eligiblePool.shift();
                            top5.push(nextTopFighter.id);
                        }

                        // 5. Isi Peringkat #6 hingga Tak Terbatas dengan sisa ELO tertinggi
                        let rank6toN = [];
                        while (eligiblePool.length > 0) {
                            const nextFighter = eligiblePool.shift();
                            rank6toN.push(nextFighter.id);
                        }

                        updatedRanks[wc] = [...top5, ...rank6toN];
                    });
                    currentRanks = updatedRanks;

                    let fotnMatchId = null;
                    let potnWinnerIds = [];

                    if (simulatedMatches.length > 0) {
                        const fotnScores = simulatedMatches.map(m => {
                            let score = randomInt(50, 100);
                            if (m.result.method.includes('Decision')) score += 20;
                            if (m.result.round >= 3) score += 15;
                            return { id: m.id, score };
                        });
                        fotnScores.sort((a,b) => b.score - a.score);
                        fotnMatchId = fotnScores[0].id;

                        const potnScores = simulatedMatches.map(m => {
                            let score = randomInt(50, 100);
                            if (m.result.method.includes('KO') || m.result.method.includes('Submission')) {
                                score += (5 - m.result.round) * 25;
                            } else {
                                score -= 40;
                            }
                            return { id: m.result.winnerId, score };
                        });
                        potnScores.sort((a,b) => b.score - a.score);
                        
                        potnWinnerIds.push(potnScores[0].id);
                        if (potnScores.length > 1 && potnScores[1].score > 70) { 
                            potnWinnerIds.push(potnScores[1].id);
                        }
                    }

                    simulatedEvt = { ...evt, matches: simulatedMatches, isSimulated: true, bonuses: { fotnMatchId, potnWinnerIds } };
                    let nextEvents = [...prev.events.filter(e => e.id !== eventId)];

                    return {
                        ...prev,
                        fighters: currentFighters,
                        champions: currentChamps,
                        rankings: currentRanks,
                        championshipHistory: currentChampionshipHistory,
                        events: nextEvents,
                        history: [simulatedEvt, ...prev.history],

                        currentYear: evt.week === 52 ? evt.year + 1 : evt.year,
                        ppvCount: evt.type === 'PPV' ? prev.ppvCount + 1 : prev.ppvCount
                    };
                });
                
                if(simulatedEvt) {
                    showToast('Acara berhasil disimulasikan!');

                }
            };

                    lucide.createIcons();

                const handleExportCopy = () => {
                    const dataStr = JSON.stringify(gameState);
                    const base64 = btoa(unescape(encodeURIComponent(dataStr)));
                    const textArea = document.createElement("textarea");
                    textArea.value = base64;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        showToast('Kode Save berhasil disalin!');
                    } catch (err) {
                        showToast('Gagal menyalin otomatis. Silakan blok & salin manual.', 'error');
                    }
                    document.body.removeChild(textArea);
                };

                const handleExportFile = () => {
                    const dataStr = JSON.stringify(gameState);
                    const base64 = btoa(unescape(encodeURIComponent(dataStr)));
                    const blob = new Blob([base64], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `UF_SaveData_Y${gameState.currentYear}_W${gameState.currentWeek}.txt`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast('File Save berhasil diunduh!');
                };

                const handleImport = () => {
                    if(!importText.trim()) return showToast('Masukkan kode save terlebih dahulu!', 'error');
                    try {
                        const dataStr = decodeURIComponent(escape(atob(importText.trim())));
                        const parsed = JSON.parse(dataStr);
                        if(parsed && parsed.fighters && parsed.events) {
                            setGameState({ ...parsed, championshipHistory: parsed.championshipHistory || [] });
                            showToast('Data Save berhasil dimuat!');
                            setImportText('');
                        } else {
                            showToast('Format data save tidak cocok!', 'error');

                                        <i data-lucide="copy" className="w-5 h-5"></i> Salin Kode Save

                                    <button onClick={handleExportFile} className="flex-1 bg-slate-800 hover:bg-slate-700 text-white px-6 py-3.5 rounded-xl font-bold transition flex items-center justify-center gap-2 border border-slate-700">

                                    onChange={(e) => setImportText(e.target.value)}
                                ></textarea>
                                
                                <button onClick={handleImport} className="w-full sm:w-auto bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white px-8 py-3.5 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/20 z-10 relative">
                                    <i data-lucide="check-circle" className="w-5 h-5"></i> Muat & Lanjutkan Game
                                </button>
                            </div>

                                    <h3 className="font-black text-red-400 text-lg flex items-center gap-2"><i data-lucide="alert-triangle" className="w-5 h-5"></i> Zona Berbahaya</h3>
                                    <p className="text-slate-400 text-sm mt-1">Hapus seluruh data permainan (petarung, riwayat, dan sabuk) lalu mulai dari awal.</p>
                                </div>
                                <button onClick={() => setModal({type: 'resetConfirm'})} className="bg-red-900/40 hover:bg-red-800 text-red-400 px-6 py-3 rounded-xl font-bold transition border border-red-900/50 flex items-center gap-2 w-full sm:w-auto justify-center whitespace-nowrap">
                                    <i data-lucide="trash-2" className="w-5 h-5"></i> Reset Semua Data
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderModal = () => {
                if (!modal) return null;
                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 sm:p-6 animate-fade-in">

                            {modal.type !== 'resetConfirm' && (
                                <button onClick={() => setModal(null)} className="absolute top-5 right-5 text-slate-400 hover:text-white bg-slate-800 p-2 rounded-full transition z-10"><i data-lucide="x" className="w-5 h-5"></i></button>

                                            localStorage.removeItem('uf_save_data');

                                    </div>
                                </div>

                    </div>
                    {renderModal()}
                    {toast && (
                        <div className={`fixed top-6 left-1/2 -translate-x-1/2 md:translate-x-0 md:left-auto md:right-6 md:bottom-6 md:top-auto px-6 py-4 rounded-2xl shadow-xl font-bold animate-fade-in z-50 flex items-center gap-3 border ${toast.type === 'success' ? 'bg-emerald-900/90 text-emerald-100 border-emerald-500/50 shadow-emerald-900/50' : 'bg-red-900/90 text-red-100 border-red-500/50 shadow-red-900/50'} backdrop-blur-md`}>
                            <i data-lucide={toast.type === 'success' ? 'check-circle' : 'alert-circle'} className="w-5 h-5"></i> {toast.msg}
                        </div>
                    )}
                </div>
            );
        };

        const AddFighterModal = ({ onSubmit, currentYear, initialData = null, isEdit = false }) => {
            const [mode, setMode] = useState(isEdit ? 'manual' : 'random');
            const [formData, setFormData] = useState(initialData || { 
                weightClass: 'Ringan', firstName:'', lastName:'', nickname:'', country:'Indonesia', 
                dob: `${currentYear-18}-01-01`, style:'Striker', str:50, grp:50, sta:50, pow:50 
            });

            useEffect(() => {
                if(isEdit && initialData) setFormData({...initialData, str: initialData.stats.striking, grp: initialData.stats.grappling, sta: initialData.stats.stamina, pow: initialData.stats.power});
            }, [isEdit, initialData]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (mode === 'random' && !isEdit) {
                    onSubmit(generateFighter(formData.weightClass, true, null, currentYear));
                } else {
                    const customData = {
                        firstName: formData.firstName, lastName: formData.lastName, nickname: formData.nickname, country: formData.country, dob: formData.dob, weightClass: formData.weightClass, style: formData.style,
                        stats: { striking: parseInt(formData.str), grappling: parseInt(formData.grp), stamina: parseInt(formData.sta), power: parseInt(formData.pow) }
                    };
                    isEdit ? onSubmit({ ...initialData, ...customData }) : onSubmit(generateFighter(formData.weightClass, false, customData, currentYear));
                }
            };
            const ovrPrev = calculateOvr({striking: parseInt(formData.str||0), grappling: parseInt(formData.grp||0), stamina: parseInt(formData.sta||0), power: parseInt(formData.pow||0)});

                            {isEdit && <p className="text-xs text-amber-500 mt-2 font-medium"><i data-lucide="info" className="w-3 h-3 inline"></i> Kelas berat permanen dan tidak dapat diubah.</p>}

                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Julukan</label><input className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 transition" value={formData.nickname} onChange={e=>setFormData({...formData, nickname: e.target.value})} /></div>
                                    <div><label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Negara</label>
                                        <select className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 transition" value={formData.country} onChange={e=>setFormData({...formData, country: e.target.value})}>

                                        </select>
                                    </div>
                                </div>

                                    <div><label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Tanggal Lahir</label><input type="date" required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 transition text-slate-200" value={formData.dob} onChange={e=>setFormData({...formData, dob: e.target.value})} /></div>

                                        <select className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 transition" value={formData.style} onChange={e=>setFormData({...formData, style: e.target.value})}>
                                            {FIGHT_STYLES.map(c=><option key={c} value={c}>{c}</option>)}

            const age = calculateAge(fighter.dob, currentYear);
            const ovr = calculateOvr(fighter.stats);
            const [retireConfirm, setRetireConfirm] = useState(false);
            
            let rankDisplay = 'Unranked';

            return (

                                    <span className="text-[10px] font-black uppercase tracking-wider px-2.5 py-1 bg-slate-800 rounded-lg border border-slate-700">{fighter.weightClass}</span>
                                    {rankDisplay === 'Champion' ? <span className="text-[10px] font-black uppercase tracking-wider px-2.5 py-1 bg-amber-500/20 text-amber-400 border border-amber-500/30 rounded-lg flex items-center gap-1"><i data-lucide="crown" className="w-3 h-3"></i> Champion</span> :
                                     rankDisplay !== 'Unranked' && rankDisplay !== 'Retired' ? <span className="text-[10px] font-black uppercase tracking-wider px-2.5 py-1 bg-indigo-900/40 text-indigo-300 border border-indigo-500/30 rounded-lg">{rankDisplay}</span> : null}
                                    {(fighter.titleWins > 0 || fighter.titleDefenses > 0) && rankDisplay !== 'Champion' && <span className="text-[10px] font-black uppercase tracking-wider px-2.5 py-1 bg-yellow-600/20 text-yellow-500 border border-yellow-500/40 rounded-lg flex items-center gap-1 shadow-inner">👑 Mantan Juara</span>}
                                    {(fighter.badges && fighter.badges.includes('Wonderkid')) && <span className="text-[10px] font-black uppercase tracking-wider px-2.5 py-1 bg-purple-900/40 text-purple-400 border border-purple-500/30 rounded-lg flex items-center gap-1 shadow-inner"><i data-lucide="star" className="w-3 h-3"></i> Wonderkid</span>}
                                    {fighter.isRetired && <span className="text-[10px] font-black uppercase tracking-wider px-2.5 py-1 bg-red-900/50 text-red-400 rounded-lg border border-red-900/50">Pensiun</span>}
                                </div>
                                <h2 className="text-3xl md:text-4xl font-black leading-none text-white tracking-tight">{fighter.firstName} <span className="text-indigo-400">"{fighter.nickname}"</span> {fighter.lastName}</h2>
                                <p className="text-slate-400 mt-2 font-medium">{fighter.country} • Lahir: {fighter.dob} (Usia {age})</p>
                            </div>
                        </div>
                        <div className="flex gap-2 w-full md:w-auto">
                            {!fighter.isRetired && (
                                <button onClick={onEdit} className="flex-1 md:flex-none bg-slate-800 hover:bg-slate-700 text-white px-4 py-2.5 rounded-xl font-bold text-sm transition flex items-center gap-2 justify-center border border-slate-700">
                                    <i data-lucide="edit-2" className="w-4 h-4"></i> Edit
                                </button>
                            )}
                            {!fighter.isRetired && (
                                retireConfirm ? (
                                    <div className="flex-1 md:flex-none flex items-center bg-red-900/20 rounded-xl border border-red-900/50 overflow-hidden">
                                        <button onClick={() => onRetire(fighter.id)} className="flex-1 bg-red-600 hover:bg-red-500 text-white px-3 py-2.5 font-bold text-xs transition">Konfirmasi</button>
                                        <button onClick={() => setRetireConfirm(false)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2.5 font-bold text-xs transition border-l border-red-900/50">Batal</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setRetireConfirm(true)} className="flex-1 md:flex-none bg-red-900/30 hover:bg-red-800 text-red-300 px-4 py-2.5 rounded-xl font-bold text-sm transition border border-red-900/50">
                                        Pensiunkan
                                    </button>
                                )
                            )}
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-4 gap-3 md:gap-5 mb-8">
                        <div className="bg-slate-900/80 p-4 rounded-2xl text-center border border-slate-800 col-span-2 md:col-span-1">
                            <p className="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-1">Rekor</p>
                            <p className="text-2xl md:text-3xl font-black text-emerald-400">{fighter.record.wins}-{fighter.record.losses}-{fighter.record.draws}</p>
                        </div>
                        <div className="bg-slate-900/80 p-4 rounded-2xl text-center border border-slate-800 flex flex-col justify-center col-span-2 md:col-span-1">
                            <p className="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-1">Gaya</p>
                            <p className="text-lg font-black text-white">{fighter.style}</p>
                        </div>
                        <div className="bg-gradient-to-b from-indigo-900/40 to-slate-900 p-4 rounded-2xl text-center border border-indigo-500/30 shadow-inner col-span-2 md:col-span-1">
                            <p className="text-[10px] uppercase font-bold tracking-wider text-indigo-400 mb-1">ELO Rating</p>
                            <p className="text-3xl font-black text-white">{fighter.elo}</p>
                        </div>
                        <div className="bg-slate-900/80 p-4 rounded-2xl text-center border border-slate-800 flex flex-col justify-center col-span-2 md:col-span-1">
                            <p className="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-1">OVR</p>
                            <p className={`text-3xl font-black ${getOvrColor(ovr)}`}>{ovr}</p>
                        </div>
                    </div>

                    <div className="mb-8">
                        <h3 className="text-sm font-black uppercase tracking-wider mb-4 text-slate-400 flex items-center gap-2"><i data-lucide="activity" className="w-4 h-4 text-indigo-400"></i> Atribut Fisik & Skill</h3>
                        <div className="grid gap-3 bg-slate-900/50 p-5 rounded-2xl border border-slate-800">
                            {Object.entries(fighter.stats).map(([k, v]) => (
                                <div key={k} className="flex items-center text-sm">
                                    <span className="w-24 capitalize text-slate-300 font-bold text-xs tracking-wide">{k}</span>
                                    <div className="flex-1 bg-slate-950 rounded-full h-2.5 overflow-hidden mr-4 border border-slate-800/50">
                                        <div className="bg-gradient-to-r from-indigo-500 to-cyan-400 h-full rounded-full" style={{width: `${v}%`}}></div>

                                    <span className="w-8 text-right font-black text-white">{v}</span>

                            <div className="space-y-3 max-h-56 overflow-y-auto custom-scrollbar pr-2">
                                {fighter.history.slice().reverse().map((h, i) => (
                                    <div key={i} className="flex flex-col sm:flex-row sm:items-center justify-between bg-slate-800/40 p-4 rounded-xl text-sm border border-slate-700/50 gap-3 hover:bg-slate-800/60 transition">
                                        <div className="flex items-center gap-4">
                                            <span className={`w-10 h-10 flex items-center justify-center rounded-lg font-black text-lg shrink-0 shadow-inner ${h.result === 'W' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'}`}>{h.result}</span>
                                            <div>
                                                <p className="font-bold text-white text-base">vs {h.opponentName}</p>
                                                <p className="text-[11px] font-bold uppercase tracking-wider text-slate-500">{h.date}</p>
                                            </div>
                                        </div>
                                        <div className="text-xs text-slate-300 sm:text-right bg-slate-900 px-3 py-2 rounded-lg font-medium border border-slate-800">{h.detail}</div>
