                        </div>
                    </div>
                );
            };

            const RecordsMenu = () => {
                const allF = gameState.fighters;
                if (allF.length === 0) return (
                    <div className="p-10 pt-20 h-full flex flex-col justify-between">
                        <p className="text-slate-500">Belum ada data petarung untuk kalkulasi rekor.</p>
                        
                        <div className="mt-12 p-6 glass-panel rounded-3xl border border-red-900/50 flex flex-col sm:flex-row items-center justify-between gap-4 bg-red-950/10">
                            <div>
                                <h3 className="font-black text-red-400 text-lg flex items-center gap-2"><i data-lucide="alert-triangle" className="w-5 h-5"></i> Zona Berbahaya</h3>
                                <p className="text-sm text-slate-500 mt-1">Hapus seluruh data permainan lalu mulai dari awal.</p>
                            </div>
                            <button onClick={() => setModal({type: 'resetConfirm'})} className="bg-red-900/40 hover:bg-red-800 text-red-400 px-6 py-3 rounded-xl font-bold transition border border-red-900/50 flex items-center gap-2 w-full sm:w-auto justify-center whitespace-nowrap">
                                <i data-lucide="trash-2" className="w-5 h-5"></i> Hapus Save Data
                            </button>
                        </div>
                    </div>
                );

                const getTop10 = (sortFn, filterFn = null) => {
                    let filtered = filterFn ? allF.filter(filterFn) : [...allF];
                    return filtered.sort(sortFn).slice(0, 10);
                };
                
                const getGoatScore = (f) => (f.record.wins * 10) - (f.record.losses * 5) + (f.titleWins * 30) + (f.titleDefenses * 40);
                
                const getP4PScore = (f) => {
                    const ovr = calculateOvr(f.stats);
                    const momentum = getFighterMomentum(f.history);
                    const isChamp = Object.values(gameState.champions).includes(f.id) ? 50 : 0;
                    return ovr + momentum + isChamp + (f.currentStreak * 5);
                };

                const lists = [
                    { t: "Pound-For-Pound", i: "crosshair", c: "red", data: getTop10((a,b) => getP4PScore(b) - getP4PScore(a), f => !f.isRetired && (f.record.wins > 0 || f.record.losses > 0)), s: "Pts", val: f => getP4PScore(f), showAll: true },
                    { t: "G.O.A.T", i: "star", c: "amber", data: getTop10((a,b) => getGoatScore(b) - getGoatScore(a), f => f.record.wins > 0 || f.record.losses > 0), s: "Pts", val: f => getGoatScore(f), showAll: true },
                    { t: "Total Laga Gelar", i: "crown", c: "amber", data: getTop10((a,b) => (b.titleWins + b.titleDefenses) - (a.titleWins + a.titleDefenses)), s: "Kali", val: f => f.titleWins + f.titleDefenses },
                    { t: "Laga Terbanyak", i: "swords", c: "indigo", data: getTop10((a,b) => (b.record.wins+b.record.losses) - (a.record.wins+a.record.losses)), s: "Laga", val: f => f.record.wins+f.record.losses },
                    { t: "Kemenangan Terbanyak", i: "trophy", c: "emerald", data: getTop10((a,b) => b.record.wins - a.record.wins), s: "Menang", val: f => f.record.wins },
                    { t: "Win Streak Terpanjang", i: "flame", c: "orange", data: getTop10((a,b) => b.currentStreak - a.currentStreak), s: "Beruntun", val: f => f.currentStreak },
                    { t: "Pertahanan Gelar", i: "shield", c: "blue", data: getTop10((a,b) => b.titleDefenses - a.titleDefenses), s: "Kali", val: f => f.titleDefenses }
                ];

                return (
                    <div className="animate-fade-in p-6 md:p-10 pb-24">
                        <div className="mb-8 pt-10 md:pt-0">
                            <h2 className="text-3xl md:text-4xl font-black text-white tracking-tight">Hall of Fame</h2>
                            <p className="text-slate-400 mt-1">Pencetak rekor dan legenda promotor.</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                            {lists.map((l, idx) => (
                                <div key={idx} className="glass-panel rounded-3xl overflow-hidden border border-slate-700/50 shadow-xl flex flex-col">
                                    <div className={`bg-${l.c}-900/30 p-5 border-b border-${l.c}-500/20 flex items-center gap-4`}>
                                        <div className={`w-10 h-10 flex items-center justify-center bg-${l.c}-500/20 rounded-xl text-${l.c}-400 shadow-inner`}>
                                            <i data-lucide={l.i} className="w-5 h-5"></i>
                                        </div>
                                        <h3 className={`font-black text-lg text-white`}>{l.t}</h3>
                                    </div>
                                    <div className="p-0 flex-1">
                                        {l.data.filter(f => l.showAll || l.val(f) > 0).length === 0 ? (
                                            <p className="text-slate-500 text-sm font-semibold text-center py-10">Belum ada rekor tercetak.</p>
                                        ) : (
                                            l.data.map((f, i) => (l.showAll || l.val(f) > 0) && (
                                                <div key={i} className="flex justify-between items-center p-4 border-b border-slate-800/50 hover:bg-slate-800/80 transition cursor-pointer group" onClick={() => setModal({type: 'fighterDetail', data: f})}>
                                                    <div className="flex items-center gap-4">
                                                        <span className="font-black text-slate-600 w-5 text-right">{i+1}.</span>
                                                        <span className={`font-bold transition ${f.isRetired ? 'text-slate-500 line-through' : 'text-slate-300 group-hover:text-white'}`}>{f.lastName}</span>
                                                    </div>
                                                    <span className={`font-black text-${l.c}-400 bg-${l.c}-900/20 px-3 py-1 rounded-lg`}>{l.val(f)} <span className="text-[10px] uppercase font-bold text-slate-500 tracking-wider ml-1">{l.s}</span></span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Zona Berbahaya - Fitur Reset Data */}
                        <div className="mt-12 p-6 glass-panel rounded-3xl border border-red-900/50 flex flex-col sm:flex-row items-center justify-between gap-4 bg-red-950/10">
                            <div>
                                <h3 className="font-black text-red-400 text-lg flex items-center gap-2"><i data-lucide="alert-triangle" className="w-5 h-5"></i> Zona Berbahaya</h3>
                                <p className="text-sm text-slate-500 mt-1">Hapus seluruh data permainan (petarung, riwayat, dan sabuk juara) lalu mulai dari awal.</p>
                            </div>
                            <button onClick={() => setModal({type: 'resetConfirm'})} className="bg-red-900/40 hover:bg-red-800 text-red-400 px-6 py-3 rounded-xl font-bold transition border border-red-900/50 flex items-center gap-2 w-full sm:w-auto justify-center whitespace-nowrap">
                                <i data-lucide="trash-2" className="w-5 h-5"></i> Hapus Save Data
                            </button>
                        </div>
                    </div>
                );
            };

            const renderModal = () => {
                if (!modal) return null;
                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 sm:p-6 animate-fade-in">
                        <div className="bg-slate-900 border border-slate-700/80 rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto custom-scrollbar relative flex flex-col">
                            {modal.type !== 'resetConfirm' && (
                                <button onClick={() => setModal(null)} className="absolute top-5 right-5 text-slate-400 hover:text-white bg-slate-800 p-2 rounded-full transition z-10"><i data-lucide="x" className="w-5 h-5"></i></button>
                            )}
                            
                            {modal.type === 'addFighter' && <AddFighterModal onSubmit={addFighter} currentYear={gameState.currentYear} />}
                            {modal.type === 'editFighter' && <AddFighterModal initialData={modal.data} onSubmit={editFighter} currentYear={gameState.currentYear} isEdit={true} />}
                            {modal.type === 'fighterDetail' && <FighterDetailModal fighter={modal.data} onRetire={retireFighter} onEdit={() => setModal({type: 'editFighter', data: modal.data})} currentYear={gameState.currentYear} gameState={gameState} />}
                            {modal.type === 'addEvent' && <AddEventModal onSubmit={addEvent} defaultYear={gameState.currentYear} defaultWeek={gameState.currentWeek} />}
                            {modal.type === 'addMatch' && <AddMatchModal eventId={modal.data} onSubmit={addMatch} gameState={gameState} />}
                            {modal.type === 'eventResult' && <EventResultModal event={modal.data} gameState={gameState} />}
                            
                            {modal.type === 'resetConfirm' && (
                                <div className="p-6 md:p-10 text-center">
                                    <div className="w-20 h-20 bg-red-900/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-red-500/50">
                                        <i data-lucide="alert-triangle" className="w-10 h-10"></i>
                                    </div>
                                    <h2 className="text-2xl md:text-3xl font-black mb-3 text-white">Hapus Semua Data?</h2>
                                    <p className="text-slate-400 mb-8 text-sm md:text-base leading-relaxed">Semua petarung, jadwal acara, sabuk juara, dan riwayat akan dihapus secara permanen dari perangkat ini. Tindakan ini <b className="text-red-400">tidak dapat dibatalkan!</b></p>
                                    <div className="flex gap-3">
                                        <button onClick={() => setModal(null)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-white py-3.5 rounded-xl font-bold transition">Batal</button>
                                        <button onClick={() => {
                                            localStorage.removeItem('uf_save_data');
                                            window.location.reload();
                                        }} className="flex-1 bg-red-600 hover:bg-red-500 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-red-500/20 transition">Ya, Hapus</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex h-screen overflow-hidden text-slate-200">
                    {renderSidebar()}
                    <div className="md:ml-64 flex-1 h-full overflow-y-auto custom-scrollbar relative">
                        <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{backgroundImage: 'radial-gradient(#6366f1 1px, transparent 1px)', backgroundSize: '32px 32px'}}></div>
                        <div className="relative z-10 min-h-full">
                            {activeTab === 'roster' && <RosterMenu />}
                            {activeTab === 'matchmaker' && <MatchmakerMenu />}
                            {activeTab === 'rankings' && <RankingsMenu />}
                            {activeTab === 'history' && <HistoryMenu />}
                            {activeTab === 'records' && <RecordsMenu />}
                        </div>
                    </div>
                    {renderModal()}
                    {toast && (
                        <div className={`fixed top-6 left-1/2 -translate-x-1/2 md:translate-x-0 md:left-auto md:right-6 md:bottom-6 md:top-auto px-6 py-4 rounded-2xl shadow-xl font-bold animate-fade-in z-50 flex items-center gap-3 border ${toast.type === 'success' ? 'bg-emerald-900/90 text-emerald-100 border-emerald-500/50 shadow-emerald-900/50' : 'bg-red-900/90 text-red-100 border-red-500/50 shadow-red-900/50'} backdrop-blur-md`}>
                            <i data-lucide={toast.type === 'success' ? 'check-circle' : 'alert-circle'} className="w-5 h-5"></i> {toast.msg}
                        </div>
                    )}
                </div>
            );
        };

        const AddFighterModal = ({ onSubmit, currentYear, initialData = null, isEdit = false }) => {
            const [mode, setMode] = useState(isEdit ? 'manual' : 'random');
            const [formData, setFormData] = useState(initialData || { 
                weightClass: 'Ringan', firstName:'', lastName:'', nickname:'', country:'Indonesia', 
                dob: `${currentYear-18}-01-01`, style:'Striker', str:50, grp:50, sta:50, pow:50 
            });

            useEffect(() => {
                if(isEdit && initialData) setFormData({...initialData, str: initialData.stats.striking, grp: initialData.stats.grappling, sta: initialData.stats.stamina, pow: initialData.stats.power});
            }, [isEdit, initialData]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (mode === 'random' && !isEdit) {
                    onSubmit(generateFighter(formData.weightClass, true, null, currentYear));
                } else {
                    const customData = {
                        firstName: formData.firstName, lastName: formData.lastName, nickname: formData.nickname, country: formData.country, dob: formData.dob, weightClass: formData.weightClass, style: formData.style,
                        stats: { striking: parseInt(formData.str), grappling: parseInt(formData.grp), stamina: parseInt(formData.sta), power: parseInt(formData.pow) }
                    };
                    isEdit ? onSubmit({ ...initialData, ...customData }) : onSubmit(generateFighter(formData.weightClass, false, customData, currentYear));
                }
            };
            const ovrPrev = calculateOvr({striking: parseInt(formData.str||0), grappling: parseInt(formData.grp||0), stamina: parseInt(formData.sta||0), power: parseInt(formData.pow||0)});

            return (
                <div className="p-6 md:p-8">
                    <h2 className="text-2xl font-black mb-6 text-white">{isEdit ? 'Edit Data Fighter' : 'Pendaftaran Fighter Baru'}</h2>
                    {!isEdit && (
                        <div className="flex gap-2 mb-8 bg-slate-800/80 p-1.5 rounded-xl border border-slate-700">
                            <button type="button" onClick={()=>setMode('random')} className={`flex-1 py-2.5 rounded-lg font-bold text-sm transition-all ${mode === 'random' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>Acak (Hanya Kelas)</button>
                            <button type="button" onClick={()=>setMode('manual')} className={`flex-1 py-2.5 rounded-lg font-bold text-sm transition-all ${mode === 'manual' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>Buat Kustom</button>
                        </div>
                    )}
                    <form onSubmit={handleSubmit} className="space-y-5">
                        <div>
                            <label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Kelas Berat</label>
                            <select className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition" value={formData.weightClass} onChange={e=>setFormData({...formData, weightClass: e.target.value})} disabled={isEdit}>
                                {WEIGHT_CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            {isEdit && <p className="text-xs text-amber-500 mt-2 font-medium"><i data-lucide="info" className="w-3 h-3 inline"></i> Kelas berat permanen dan tidak dapat diubah.</p>}
                        </div>
                        {mode === 'manual' && (
                            <div className="animate-fade-in space-y-5">
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Nama Depan</label><input required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 transition" value={formData.firstName} onChange={e=>setFormData({...formData, firstName: e.target.value})} /></div>
                                    <div><label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Nama Belakang</label><input required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 transition" value={formData.lastName} onChange={e=>setFormData({...formData, lastName: e.target.value})} /></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Julukan</label><input className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 transition" value={formData.nickname} onChange={e=>setFormData({...formData, nickname: e.target.value})} /></div>
                                    <div><label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Negara</label>
                                        <select className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 transition" value={formData.country} onChange={e=>setFormData({...formData, country: e.target.value})}>
                                            {COUNTRIES.map(c=><option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Tanggal Lahir</label><input type="date" required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 transition text-slate-200" value={formData.dob} onChange={e=>setFormData({...formData, dob: e.target.value})} /></div>
                                    <div><label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Gaya Tarung</label>
                                        <select className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 transition" value={formData.style} onChange={e=>setFormData({...formData, style: e.target.value})}>
                                            {FIGHT_STYLES.map(c=><option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                </div>
                                
                                <div className="pt-6 border-t border-slate-800 mt-6">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-black text-slate-300">Atribut Kemampuan</h3>
                                        <span className="bg-indigo-900/50 text-indigo-300 px-4 py-1.5 rounded-lg font-black border border-indigo-500/30 shadow-inner tracking-widest text-sm">OVR {ovrPrev || 0}</span>
                                    </div>
                                    <div className="grid grid-cols-4 gap-3 md:gap-4">
                                        {['str','grp','sta','pow'].map(stat => (
                                            <div key={stat}>
                                                <label className="block text-[10px] font-bold uppercase text-slate-500 mb-2 text-center">{stat === 'str' ? 'Strike' : stat === 'grp' ? 'Grapple' : stat === 'sta' ? 'Stamina' : 'Power'}</label>
                                                <input type="number" min="1" max="100" required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-2 py-3 text-center font-black text-lg focus:border-indigo-500 focus:bg-slate-800 transition outline-none" value={formData[stat]} onChange={e=>setFormData({...formData, [stat]: e.target.value})} />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        <button type="submit" className="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 py-4 rounded-xl font-black mt-8 shadow-lg shadow-indigo-500/25 transition-all text-white text-lg tracking-wide">{isEdit ? 'Simpan Perubahan' : 'Daftarkan Fighter'}</button>
                    </form>
                </div>
            );
        };

        const FighterDetailModal = ({ fighter, onRetire, onEdit, currentYear, gameState }) => {
            const age = calculateAge(fighter.dob, currentYear);
            const ovr = calculateOvr(fighter.stats);
            const [retireConfirm, setRetireConfirm] = useState(false);
            
            let rankDisplay = 'Unranked';
            if (gameState.champions[fighter.weightClass] === fighter.id) rankDisplay = 'Champion';
            else {
                const idx = gameState.rankings[fighter.weightClass].indexOf(fighter.id);
                if (idx !== -1) rankDisplay = `Rank #${idx + 1}`;
            }
            if(fighter.isRetired) rankDisplay = 'Retired';
            
            return (
                <div className="p-6 md:p-8">
                    <div className="flex flex-col md:flex-row justify-between items-start mb-8 gap-6">
                        <div className="flex items-center gap-5 w-full md:w-auto">
                            <div className="w-20 h-20 shrink-0 rounded-2xl bg-gradient-to-br from-slate-700 to-slate-800 flex items-center justify-center font-black text-3xl text-slate-300 shadow-inner border border-slate-600">
                                {getInitials(fighter.firstName, fighter.lastName)}
                            </div>
                            <div>
                                <div className="flex flex-wrap items-center gap-2 mb-2">
                                    <span className="text-[10px] font-black uppercase tracking-wider px-2.5 py-1 bg-slate-800 rounded-lg border border-slate-700">{fighter.weightClass}</span>
                                    {rankDisplay === 'Champion' ? <span className="text-[10px] font-black uppercase tracking-wider px-2.5 py-1 bg-amber-500/20 text-amber-400 border border-amber-500/30 rounded-lg flex items-center gap-1"><i data-lucide="crown" className="w-3 h-3"></i> Champion</span> :
                                     rankDisplay !== 'Unranked' && rankDisplay !== 'Retired' ? <span className="text-[10px] font-black uppercase tracking-wider px-2.5 py-1 bg-indigo-900/40 text-indigo-300 border border-indigo-500/30 rounded-lg">{rankDisplay}</span> : null}
                                    {fighter.isRetired && <span className="text-[10px] font-black uppercase tracking-wider px-2.5 py-1 bg-red-900/50 text-red-400 rounded-lg border border-red-900/50">Pensiun</span>}
                                </div>
                                <h2 className="text-3xl md:text-4xl font-black leading-none text-white tracking-tight">{fighter.firstName} <span className="text-indigo-400">"{fighter.nickname}"</span> {fighter.lastName}</h2>
                                <p className="text-slate-400 mt-2 font-medium">{fighter.country} • Lahir: {fighter.dob} (Usia {age})</p>
                            </div>
                        </div>
                        <div className="flex gap-2 w-full md:w-auto">
                            {!fighter.isRetired && (
                                <button onClick={onEdit} className="flex-1 md:flex-none bg-slate-800 hover:bg-slate-700 text-white px-4 py-2.5 rounded-xl font-bold text-sm transition flex items-center gap-2 justify-center border border-slate-700">
                                    <i data-lucide="edit-2" className="w-4 h-4"></i> Edit
                                </button>
                            )}
                            {!fighter.isRetired && (
                                retireConfirm ? (
                                    <div className="flex-1 md:flex-none flex items-center bg-red-900/20 rounded-xl border border-red-900/50 overflow-hidden">
                                        <button onClick={() => onRetire(fighter.id)} className="flex-1 bg-red-600 hover:bg-red-500 text-white px-3 py-2.5 font-bold text-xs transition">Konfirmasi</button>
                                        <button onClick={() => setRetireConfirm(false)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2.5 font-bold text-xs transition border-l border-red-900/50">Batal</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setRetireConfirm(true)} className="flex-1 md:flex-none bg-red-900/30 hover:bg-red-800 text-red-300 px-4 py-2.5 rounded-xl font-bold text-sm transition border border-red-900/50">
                                        Pensiunkan
                                    </button>
                                )
                            )}
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-3 gap-3 md:gap-5 mb-8">
                        <div className="bg-slate-900/80 p-4 rounded-2xl text-center border border-slate-800">
                            <p className="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-1">Rekor</p>
                            <p className="text-2xl md:text-3xl font-black text-emerald-400">{fighter.record.wins}-{fighter.record.losses}-{fighter.record.draws}</p>
                        </div>
                        <div className="bg-slate-900/80 p-4 rounded-2xl text-center border border-slate-800 flex flex-col justify-center">
                            <p className="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-1">Gaya</p>
                            <p className="text-lg font-black text-white">{fighter.style}</p>
                        </div>
                        <div className="bg-gradient-to-b from-indigo-900/40 to-slate-900 p-4 rounded-2xl text-center border border-indigo-500/30 shadow-inner">
                            <p className="text-[10px] uppercase font-bold tracking-wider text-indigo-400 mb-1">Rating OVR</p>
                            <p className="text-3xl font-black text-white">{ovr}</p>
                        </div>
                    </div>

                    <div className="mb-8">
                        <h3 className="text-sm font-black uppercase tracking-wider mb-4 text-slate-400 flex items-center gap-2"><i data-lucide="activity" className="w-4 h-4 text-indigo-400"></i> Atribut Fisik & Skill</h3>
                        <div className="grid gap-3 bg-slate-900/50 p-5 rounded-2xl border border-slate-800">
                            {Object.entries(fighter.stats).map(([k, v]) => (
                                <div key={k} className="flex items-center text-sm">
                                    <span className="w-24 capitalize text-slate-300 font-bold text-xs tracking-wide">{k}</span>
                                    <div className="flex-1 bg-slate-950 rounded-full h-2.5 overflow-hidden mr-4 border border-slate-800/50">
                                        <div className="bg-gradient-to-r from-indigo-500 to-cyan-400 h-full rounded-full" style={{width: `${v}%`}}></div>
                                    </div>
                                    <span className="w-8 text-right font-black text-white">{v}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div>
                        <h3 className="text-sm font-black uppercase tracking-wider mb-4 text-slate-400 flex items-center gap-2"><i data-lucide="history" className="w-4 h-4 text-indigo-400"></i> Riwayat Laga</h3>
                        {fighter.history.length === 0 ? <p className="text-sm text-slate-500 bg-slate-900/50 p-6 rounded-2xl text-center font-medium border border-dashed border-slate-800">Belum ada laga yang tercatat di oktagon.</p> : (
                            <div className="space-y-3 max-h-56 overflow-y-auto custom-scrollbar pr-2">
                                {fighter.history.slice().reverse().map((h, i) => (
                                    <div key={i} className="flex flex-col sm:flex-row sm:items-center justify-between bg-slate-800/40 p-4 rounded-xl text-sm border border-slate-700/50 gap-3 hover:bg-slate-800/60 transition">
                                        <div className="flex items-center gap-4">
                                            <span className={`w-10 h-10 flex items-center justify-center rounded-lg font-black text-lg shrink-0 shadow-inner ${h.result === 'W' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'}`}>{h.result}</span>
                                            <div>
                                                <p className="font-bold text-white text-base">vs {h.opponentName}</p>
                                                <p className="text-[11px] font-bold uppercase tracking-wider text-slate-500">{h.date}</p>
                                            </div>
                                        </div>
                                        <div className="text-xs text-slate-300 sm:text-right bg-slate-900 px-3 py-2 rounded-lg font-medium border border-slate-800">{h.detail}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AddEventModal = ({ onSubmit, defaultYear, defaultWeek }) => {
            const [type, setType] = useState('Fight Week');
            const [week, setWeek] = useState(defaultWeek);
            const [year, setYear] = useState(defaultYear);

            return (
                <div className="p-6 md:p-8">
                    <h2 className="text-2xl font-black mb-6 text-white">Jadwalkan Acara Baru</h2>
                    <form onSubmit={(e) => { e.preventDefault(); onSubmit({ type, week: parseInt(week), year: parseInt(year) }); }} className="space-y-5">
                        <div>
                            <label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Jenis Acara</label>
                            <select className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white outline-none focus:border-indigo-500 transition" value={type} onChange={e=>setType(e.target.value)}>
                                <option value="Fight Week">Fight Week (Regular)</option>
                                <option value="PPV">Pay-Per-View (PPV)</option>
                            </select>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Pekan Ke-</label>
                                <input type="number" min="1" max="52" required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white outline-none focus:border-indigo-500 transition font-black" value={week} onChange={e=>setWeek(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Tahun</label>
                                <input type="number" min="2026" required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white outline-none focus:border-indigo-500 transition font-black" value={year} onChange={e=>setYear(e.target.value)} />
                            </div>
                        </div>
                        <button type="submit" className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 py-4 rounded-xl font-black mt-8 shadow-lg shadow-emerald-500/25 text-white text-lg transition-all tracking-wide">Buat Jadwal</button>
                    </form>
                </div>
            );
        };

        const AddMatchModal = ({ eventId, onSubmit, gameState }) => {
            const [weightClass, setWeightClass] = useState('Ringan');
            const [isTitleFight, setIsTitleFight] = useState(false);
            const [f1Id, setF1Id] = useState('');
            const [f2Id, setF2Id] = useState('');
            const [isManual, setIsManual] = useState(false);
            const [manualWinner, setManualWinner] = useState('');
            const [manualMethod, setManualMethod] = useState('KO/TKO');
            const [manualRound, setManualRound] = useState('1');
            const [manualTime, setManualTime] = useState('02:30');

            const evt = gameState.events.find(e => e.id === eventId);
            const scheduledFighterIds = gameState.events.flatMap(e => e.matches.flatMap(m => [m.f1Id, m.f2Id]));
            const titleFightExists = evt.matches.some(m => m.isTitleFight && m.weightClass === weightClass);
            const champId = gameState.champions[weightClass];

            let availableFighters = gameState.fighters.filter(f => !f.isRetired && f.weightClass === weightClass && !scheduledFighterIds.includes(f.id));

            if (!isTitleFight && champId) {
                availableFighters = availableFighters.filter(f => f.id !== champId);
            }

            availableFighters.sort((a, b) => {
                if (a.id === champId) return -1;
                if (b.id === champId) return 1;
                
                const rankA = gameState.rankings[weightClass].indexOf(a.id);
                const rankB = gameState.rankings[weightClass].indexOf(b.id);
                const valA = rankA === -1 ? 999 : rankA;
                const valB = rankB === -1 ? 999 : rankB;
                return valA - valB;
            });

            useEffect(() => {
                if (isTitleFight) {
                    if (champId && !scheduledFighterIds.includes(champId)) setF1Id(champId);
                    else setF1Id('');
                } else setF1Id('');
                setF2Id('');
            }, [isTitleFight, weightClass]);

            const getRankText = (id, wc) => {
                if(gameState.champions[wc] === id) return 'C';
                const idx = gameState.rankings[wc].indexOf(id);
                return idx !== -1 ? `#${idx + 1}` : 'UR';
            };

            const checkH2H = (id1, id2) => {
                if(!id1 || !id2) return null;
                const f1 = gameState.fighters.find(f=>f.id===id1);
                let wins = 0, losses = 0;
                f1.history.forEach(h => {
                    if(h.opponentId === id2) { if(h.result === 'W') wins++; else losses++; }
                });
                return `${wins} - ${losses}`;
            };

            const getMomentumText = (history) => {
                if (!history || history.length === 0) return '➖ (Skor: 0)';
                
                const score = getFighterMomentum(history);
                let streakType = null;
                let streakCount = 0;
                
                for (let i = history.length - 1; i >= 0; i--) {
                    if (streakType === null) {
                        streakType = history[i].result;
                        streakCount = 1;
                    } else if (streakType === history[i].result) {
                        streakCount++;
                    } else {
                        break;
                    }
                }

                const scoreText = score > 0 ? `+${score}` : score;

                if (streakType === 'W') return `${'🔥'.repeat(Math.min(3, streakCount))} (Skor: ${scoreText})`;
                else if (streakType === 'L') return `${'🧊'.repeat(Math.min(3, streakCount))} (Skor: ${scoreText})`;
                
                return `➖ (Skor: ${scoreText})`;
            };

            const handleSubmit = () => {
                let manualResult = null;
                if (isManual && manualWinner) {
                    manualResult = {
                        winnerId: manualWinner,
                        loserId: manualWinner === f1Id ? f2Id : f1Id,
                        method: manualMethod,
                        round: parseInt(manualRound),
                        time: manualTime
                    };
                }
                onSubmit(eventId, { weightClass, isTitleFight, f1Id, f2Id, manualResult });
            };

            return (
                <div className="p-6 md:p-8">
                    <h2 className="text-2xl font-black mb-6 text-white">Susun Pertandingan</h2>
                    
                    <div className="space-y-4 mb-6">
                        <div>
                            <label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Kelas Berat Divisi</label>
                            <select className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 font-bold text-white transition" value={weightClass} onChange={e=>{setWeightClass(e.target.value); setIsTitleFight(false);}}>
                                {WEIGHT_CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div className="flex items-center gap-3 bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                            <input type="checkbox" id="titleFight" checked={isTitleFight} onChange={e=>setIsTitleFight(e.target.checked)} className="w-5 h-5 accent-amber-500 rounded cursor-pointer" disabled={titleFightExists} />
                            <label htmlFor="titleFight" className={`font-black text-sm tracking-wide ${titleFightExists ? 'text-slate-600' : 'text-amber-400 cursor-pointer'}`}>
                                PEREBUTAN GELAR JUARA {titleFightExists && '(Maksimal 1 per kelas di satu event)'}
                            </label>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row gap-4 bg-slate-900/80 p-5 rounded-2xl border border-slate-700 relative">
                        <div className="flex-1 z-10">
                            <label className="block text-[10px] font-black uppercase tracking-wider text-red-500 mb-2 text-center md:text-left">Sudut Merah</label>
                            <select className="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-3.5 text-sm outline-none focus:border-red-500 font-semibold text-white shadow-inner transition" value={f1Id} onChange={e=>setF1Id(e.target.value)} disabled={isTitleFight && gameState.champions[weightClass] && !scheduledFighterIds.includes(gameState.champions[weightClass])}>
                                <option value="">Pilih Petarung...</option>
                                {availableFighters.filter(f=>f.id !== f2Id).map(f => (
                                    <option key={f.id} value={f.id}>[{getRankText(f.id, weightClass)}] {f.lastName} (Usia {calculateAge(f.dob, gameState.currentYear)}) | OVR: {calculateOvr(f.stats)} | Rekor: {f.record.wins}-{f.record.losses} | {getMomentumText(f.history)}</option>
                                ))}
                            </select>
                        </div>
                        
                        <div className="flex items-center justify-center py-2 md:py-0 z-10">
                            <span className="font-black text-slate-600 px-3 text-xl italic">VS</span>
                        </div>

                        <div className="flex-1 z-10">
                            <label className="block text-[10px] font-black uppercase tracking-wider text-blue-500 mb-2 text-center md:text-right">Sudut Biru</label>
                            <select className="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-3.5 text-sm outline-none focus:border-blue-500 font-semibold text-white shadow-inner transition" value={f2Id} onChange={e=>setF2Id(e.target.value)}>
                                <option value="">Pilih Petarung...</option>
                                {availableFighters.filter(f=>f.id !== f1Id).map(f => (
                                    <option key={f.id} value={f.id}>[{getRankText(f.id, weightClass)}] {f.lastName} (Usia {calculateAge(f.dob, gameState.currentYear)}) | OVR: {calculateOvr(f.stats)} | Rekor: {f.record.wins}-{f.record.losses} | {getMomentumText(f.history)}</option>
                                ))}
                            </select>
                        </div>
                    </div>

                    {f1Id && f2Id && (
                        <div className="mt-6 text-center bg-slate-900 border border-slate-700 py-4 rounded-2xl shadow-inner mb-6">
                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-500 block mb-1">Head to Head (Menang - Kalah)</span>
                            <span className="font-black text-3xl text-white tracking-widest">{checkH2H(f1Id, f2Id)}</span>
                        </div>
                    )}

                    {f1Id && f2Id && (
                        <div className="bg-slate-800/60 p-5 rounded-2xl border border-slate-700/50 mb-6">
                            <div className="flex items-center gap-3 mb-4">
                                <input type="checkbox" id="manualResult" checked={isManual} onChange={e=>setIsManual(e.target.checked)} className="w-5 h-5 accent-indigo-500 rounded cursor-pointer" />
                                <label htmlFor="manualResult" className="font-bold text-sm tracking-wide text-indigo-300 cursor-pointer">
                                    Atur Hasil Pertandingan Secara Manual (Override Simulasi RNG)
                                </label>
                            </div>
                            
                            {isManual && (
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 animate-fade-in mt-4">
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-1">Pemenang</label>
                                        <select className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-indigo-500 text-white font-bold" value={manualWinner} onChange={e=>setManualWinner(e.target.value)}>
                                            <option value="">Pilih...</option>
                                            <option value={f1Id}>Sudut Merah</option>
                                            <option value={f2Id}>Sudut Biru</option>
                                        </select>
                                    </div>
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-1">Metode Akhir</label>
                                        <select className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-indigo-500 text-white" value={manualMethod} onChange={e=>setManualMethod(e.target.value)}>
                                            <option value="KO/TKO">KO/TKO</option>
                                            <option value="Submission">Submission</option>
                                            <option value="Decision (Unanimous)">Decision (Unanimous)</option>
                                            <option value="Decision (Split)">Decision (Split)</option>
                                            <option value="Decision (Majority)">Decision (Majority)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-1">Berakhir Ronde</label>
                                        <input type="number" min="1" max={isTitleFight ? 5 : 3} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-indigo-500 text-white text-center font-bold" value={manualRound} onChange={e=>setManualRound(e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-1">Waktu</label>
                                        <input type="text" placeholder="05:00" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-indigo-500 text-white text-center font-bold" value={manualTime} onChange={e=>setManualTime(e.target.value)} />
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <button 
                        onClick={handleSubmit}
                        disabled={!f1Id || !f2Id || (isManual && !manualWinner)}
                        className="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 disabled:from-slate-800 disabled:to-slate-800 disabled:text-slate-500 disabled:cursor-not-allowed py-4 rounded-xl font-black mt-2 transition-all shadow-lg text-white text-lg tracking-wide"
                    >
                        Simpan Pertandingan
                    </button>
                </div>
            );
        };

        const EventResultModal = ({ event, gameState }) => (
            <div className="p-6 md:p-10">
                <div className="text-center mb-10 pb-6 border-b border-slate-800 relative">
                    <span className="text-[10px] font-black uppercase tracking-widest text-indigo-300 bg-indigo-900/30 border border-indigo-500/30 px-4 py-1.5 rounded-full mb-4 inline-block shadow-lg">Pekan {event.week} • Tahun {event.year}</span>
                    <h2 className="text-3xl md:text-5xl font-black text-white tracking-tight mb-2">{event.name}</h2>
                    <p className="text-emerald-400 font-black tracking-widest text-sm bg-emerald-900/20 inline-block px-4 py-1 rounded-lg border border-emerald-500/20">HASIL RESMI</p>
                </div>
                <div className="space-y-4">
                    {event.matches.map((m, i) => {
                        const f1 = gameState.fighters.find(f => f.id === m.f1Id);
                        const f2 = gameState.fighters.find(f => f.id === m.f2Id);
                        const w = m.result.winnerId === f1.id ? f1 : f2;
                        const l = m.result.winnerId === f1.id ? f2 : f1;
                        
                        const isFotn = event.bonuses?.fotnMatchId === m.id;
                        const isPotn = event.bonuses?.potnWinnerIds?.includes(w.id);

                        return (
                            <div key={m.id} className={`bg-slate-900/80 p-5 rounded-2xl border-l-4 ${isFotn ? 'border-orange-500 shadow-lg shadow-orange-500/10' : 'border-emerald-500'} flex flex-col md:flex-row justify-between items-start md:items-center gap-4 relative overflow-hidden group`}>
                                <div className={`absolute top-0 right-0 w-32 h-32 rounded-bl-full pointer-events-none ${isFotn ? 'bg-orange-500/10' : 'bg-emerald-500/5'}`}></div>
                                <div className="flex-1 z-10 w-full">
                                    <div className="flex flex-wrap items-center gap-2 mb-2">
                                        {i === 0 && <span className="text-[10px] font-black bg-red-600/20 text-red-400 px-2.5 py-0.5 rounded border border-red-500/30 tracking-wider">MAIN EVENT</span>}
                                        <span className="text-[10px] font-bold text-slate-400 bg-slate-800 px-2.5 py-0.5 rounded uppercase tracking-wider">{m.weightClass}</span>
                                        {m.isTitleFight && <span className="text-[10px] font-black text-amber-400 bg-amber-900/30 px-2.5 py-0.5 rounded tracking-widest border border-amber-500/30">TITLE BOUT</span>}
                                        {isFotn && <span className="text-[10px] font-black text-orange-400 bg-orange-900/30 px-2.5 py-0.5 rounded tracking-widest border border-orange-500/30 flex items-center gap-1"><i data-lucide="flame" className="w-3 h-3"></i> FOTN</span>}
                                    </div>
                                    <p className="font-black text-xl text-white flex items-center gap-2 flex-wrap">
                                        <span className="text-emerald-400">{w.lastName}</span> 
                                        {isPotn && <span className="bg-yellow-500/20 text-yellow-400 text-[9px] px-1.5 py-0.5 rounded uppercase border border-yellow-500/30 font-black tracking-widest inline-flex items-center gap-1" title="Performance of the Night"><i data-lucide="award" className="w-3 h-3"></i> POTN</span>}
                                        <span className="text-sm font-medium text-slate-500 mx-1">def.</span> 
                                        <span className="text-slate-400">{l.lastName}</span>
                                    </p>
                                </div>
                                <div className="text-left md:text-right bg-slate-950 px-5 py-3 rounded-xl border border-slate-800 z-10 w-full md:w-auto shadow-inner">
                                    <p className="text-base font-black text-white">{m.result.method}</p>
                                    <p className="text-[11px] font-bold uppercase tracking-wider text-slate-500 mt-0.5">Ronde {m.result.round} • {m.result.time}</p>
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
