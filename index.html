                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AddEventModal = ({ onSubmit, defaultYear, defaultWeek, gameState }) => {
            // Mencari jadwal paling akhir yang sudah dibuat di antrean Matchmaker
            let latestYear = defaultYear;
            let latestWeek = defaultWeek;

            if (gameState && gameState.events && gameState.events.length > 0) {
                gameState.events.forEach(evt => {
                    if (evt.year > latestYear || (evt.year === latestYear && evt.week > latestWeek)) {
                        latestYear = evt.year;
                        latestWeek = evt.week;
                    }
                });
            }

            // Waktu minimal selalu 1 pekan setelah acara terakhir (atau waktu saat ini jika kosong)
            const initialYear = latestWeek === 52 ? latestYear + 1 : latestYear;
            const initialWeek = latestWeek === 52 ? 1 : latestWeek + 1;

            const [type, setType] = useState('Fight Week');
            const [week, setWeek] = useState(initialWeek);
            const [year, setYear] = useState(initialYear);
            const [weightClass, setWeightClass] = useState('Ringan');

            // Tentukan batas minimal input agar mutlak tidak bisa mundur
            const minYear = initialYear;
            const minWeek = parseInt(year) === minYear ? initialWeek : 1;

            // Efek auto-koreksi: Jika user mengetik manual angka yang lebih kecil dari batas, paksa kembali ke batas minimal
            useEffect(() => {
                if (parseInt(year) < minYear) {
                    setYear(minYear);
                } else if (parseInt(year) === minYear && parseInt(week) < minWeek) {
                    setWeek(minWeek);
                }
            }, [year, week, minYear, minWeek]);

            const scheduledFighterIds = gameState ? gameState.events.flatMap(e => e.matches.flatMap(m => [m.f1Id, m.f2Id])) : [];
            const availableFighters = gameState ? gameState.fighters.filter(f => {
                if (f.isRetired || f.weightClass !== weightClass || scheduledFighterIds.includes(f.id)) return false;
                const totalFights = f.record.wins + f.record.losses + f.record.draws;
                return totalFights <= 3;
            }) : [];
            const canStartTournament = availableFighters.length >= 16;

            return (
                <div className="p-6 md:p-8">
                    <h2 className="text-2xl font-black mb-6 text-white">Jadwalkan Acara Baru</h2>
                    <form onSubmit={(e) => { e.preventDefault(); onSubmit({ type, week: parseInt(week), year: parseInt(year), weightClass }); }} className="space-y-5">
                        <div>
                            <label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Jenis Acara</label>
                            <select className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white outline-none focus:border-indigo-500 transition" value={type} onChange={e=>setType(e.target.value)}>
                                <option value="Fight Week">Fight Week (Regular)</option>
                                <option value="PPV">Pay-Per-View (PPV)</option>
                                <option value="Turnamen">Turnamen (Sistem Gugur 16 Petarung)</option>
                            </select>
                        </div>
                        
                        {type === 'Turnamen' && (
                            <div className="p-4 bg-purple-900/20 border border-purple-500/30 rounded-xl animate-fade-in">
                                <label className="block text-[11px] font-black uppercase tracking-wider text-purple-400 mb-2">Pilih Kelas Untuk Turnamen</label>
                                <select className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:border-purple-500 transition mb-2" value={weightClass} onChange={e=>setWeightClass(e.target.value)}>
                                    {WEIGHT_CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <p className={`text-xs font-bold ${canStartTournament ? 'text-emerald-400' : 'text-red-400'}`}>
                                    Petarung Tersedia (Maks 3 Laga): {availableFighters.length} / 16
                                    <br/><span className="font-medium text-slate-400 text-[10px] mt-1 inline-block">Kekurangan slot akan diisi otomatis oleh petarung acak baru.</span>
                                </p>
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Pekan Ke-</label>
                                <input type="number" min={minWeek} max="52" required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white outline-none focus:border-indigo-500 transition font-black" value={week} onChange={e=>setWeek(e.target.value)} />
                                <p className="text-[10px] text-slate-500 mt-1">Min: Pekan {minWeek}</p>
                            </div>
                            <div>
                                <label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Tahun</label>
                                <input type="number" min={minYear} required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white outline-none focus:border-indigo-500 transition font-black" value={year} onChange={e=>setYear(e.target.value)} />
                            </div>
                        </div>
                        <button type="submit" className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 py-4 rounded-xl font-black mt-8 shadow-lg shadow-emerald-500/25 text-white text-lg transition-all tracking-wide">Buat Jadwal</button>
                    </form>
                </div>
            );
        };

        const AddMatchModal = ({ eventId, onSubmit, gameState }) => {
            const [weightClass, setWeightClass] = useState('Ringan');
            const [isTitleFight, setIsTitleFight] = useState(false);
            const [f1Id, setF1Id] = useState('');
            const [f2Id, setF2Id] = useState('');
            const [isManual, setIsManual] = useState(false);
            const [manualWinner, setManualWinner] = useState('');
            const [manualMethod, setManualMethod] = useState('KO/TKO');
            const [manualRound, setManualRound] = useState('1');
            const [manualTime, setManualTime] = useState('02:30');

            const evt = gameState.events.find(e => e.id === eventId);
            const scheduledFighterIds = gameState.events.flatMap(e => e.matches.flatMap(m => [m.f1Id, m.f2Id]));
            const titleFightExists = evt.matches.some(m => m.isTitleFight && m.weightClass === weightClass);
            const champId = gameState.champions[weightClass];

            let availableFighters = gameState.fighters.filter(f => !f.isRetired && f.weightClass === weightClass && !scheduledFighterIds.includes(f.id));

            if (!isTitleFight && champId) {
                availableFighters = availableFighters.filter(f => f.id !== champId);
            }

            // Urutkan dropdown secara absolut berdasarkan Juara -> Ranking -> ELO Tertinggi
            availableFighters.sort((a, b) => {
                if (a.id === champId) return -1;
                if (b.id === champId) return 1;
                
                const rankA = gameState.rankings[weightClass].indexOf(a.id);
                const rankB = gameState.rankings[weightClass].indexOf(b.id);
                const valA = rankA === -1 ? 9999 : rankA;
                const valB = rankB === -1 ? 9999 : rankB;
                
                if (valA !== valB) return valA - valB;
                return b.elo - a.elo; // Mengurutkan Unranked berdasarkan ELO
            });

            useEffect(() => {
                if (isTitleFight) {
                    if (champId && !scheduledFighterIds.includes(champId)) setF1Id(champId);
                    else setF1Id('');
                } else setF1Id('');
                setF2Id('');
            }, [isTitleFight, weightClass]);

            const getRankText = (id, wc) => {
                if(gameState.champions[wc] === id) return 'C';
                const idx = gameState.rankings[wc].indexOf(id);
                return idx !== -1 ? `#${idx + 1}` : 'UR';
            };

            const checkH2H = (id1, id2) => {
                if(!id1 || !id2) return null;
                const f1 = gameState.fighters.find(f=>f.id===id1);
                let wins = 0, losses = 0;
                f1.history.forEach(h => {
                    if(h.opponentId === id2) { if(h.result === 'W') wins++; else losses++; }
                });
                return `${wins} - ${losses}`;
            };

            const getMomentumIcons = (history) => {
                if (!history || history.length === 0) return '➖';
                return history.slice(-5).map(h => h.result === 'W' ? '✅' : (h.result === 'L' ? '❌' : '➖')).join('');
            };

            const handleSubmit = () => {
                let manualResult = null;
                if (isManual && manualWinner) {
                    manualResult = {
                        winnerId: manualWinner,
                        loserId: manualWinner === f1Id ? f2Id : f1Id,
                        method: manualMethod,
                        round: parseInt(manualRound),
                        time: manualTime
                    };
                }
                onSubmit(eventId, { weightClass, isTitleFight, f1Id, f2Id, manualResult });
            };

            return (
                <div className="p-6 md:p-8">
                    <h2 className="text-2xl font-black mb-6 text-white">Susun Pertandingan</h2>
                    
                    <div className="space-y-4 mb-6">
                        <div>
                            <label className="block text-[11px] font-black uppercase tracking-wider text-slate-400 mb-2">Kelas Berat Divisi</label>
                            <select className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 font-bold text-white transition" value={weightClass} onChange={e=>{setWeightClass(e.target.value); setIsTitleFight(false);}}>
                                {WEIGHT_CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div className="flex items-center gap-3 bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                            <input type="checkbox" id="titleFight" checked={isTitleFight} onChange={e=>setIsTitleFight(e.target.checked)} className="w-5 h-5 accent-amber-500 rounded cursor-pointer" disabled={titleFightExists} />
                            <label htmlFor="titleFight" className={`font-black text-sm tracking-wide ${titleFightExists ? 'text-slate-600' : 'text-amber-400 cursor-pointer'}`}>
                                PEREBUTAN GELAR JUARA {titleFightExists && '(Maksimal 1 per kelas di satu event)'}
                            </label>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row gap-4 bg-slate-900/80 p-5 rounded-2xl border border-slate-700 relative">
                        <div className="flex-1 z-10">
                            <label className="block text-[10px] font-black uppercase tracking-wider text-red-500 mb-2 text-center md:text-left">Sudut Merah</label>
                            <select className="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-3.5 text-sm outline-none focus:border-red-500 font-semibold text-white shadow-inner transition" value={f1Id} onChange={e=>setF1Id(e.target.value)} disabled={isTitleFight && gameState.champions[weightClass] && !scheduledFighterIds.includes(gameState.champions[weightClass])}>
                                <option value="">Pilih Petarung...</option>
                                {availableFighters.filter(f=>f.id !== f2Id).map(f => (
                                    <option key={f.id} value={f.id}>{getRankText(f.id, weightClass)} {(f.titleWins > 0 || f.titleDefenses > 0) ? '👑 ' : ''}{(f.badges && f.badges.includes('Wonderkid')) ? '🌟 ' : ''}{f.lastName} {f.record.wins}-{f.record.losses} {f.elo} {getMomentumIcons(f.history)}</option>
                                ))}
                            </select>
                        </div>
                        
                        <div className="flex items-center justify-center py-2 md:py-0 z-10">
                            <span className="font-black text-slate-600 px-3 text-xl italic">VS</span>
                        </div>

                        <div className="flex-1 z-10">
                            <label className="block text-[10px] font-black uppercase tracking-wider text-blue-500 mb-2 text-center md:text-right">Sudut Biru</label>
                            <select className="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-3.5 text-sm outline-none focus:border-blue-500 font-semibold text-white shadow-inner transition" value={f2Id} onChange={e=>setF2Id(e.target.value)}>
                                <option value="">Pilih Petarung...</option>
                                {availableFighters.filter(f=>f.id !== f1Id).map(f => (
                                    <option key={f.id} value={f.id}>{getRankText(f.id, weightClass)} {(f.titleWins > 0 || f.titleDefenses > 0) ? '👑 ' : ''}{(f.badges && f.badges.includes('Wonderkid')) ? '🌟 ' : ''}{f.lastName} {f.record.wins}-{f.record.losses} {f.elo} {getMomentumIcons(f.history)}</option>
                                ))}
                            </select>
                        </div>
                    </div>

                    {f1Id && f2Id && (
                        <div className="mt-6 text-center bg-slate-900 border border-slate-700 py-4 rounded-2xl shadow-inner mb-6">
                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-500 block mb-1">Head to Head (Menang - Kalah)</span>
                            <span className="font-black text-3xl text-white tracking-widest">{checkH2H(f1Id, f2Id)}</span>
                        </div>
                    )}

                    {f1Id && f2Id && (
                        <div className="bg-slate-800/60 p-5 rounded-2xl border border-slate-700/50 mb-6">
                            <div className="flex items-center gap-3 mb-4">
                                <input type="checkbox" id="manualResult" checked={isManual} onChange={e=>setIsManual(e.target.checked)} className="w-5 h-5 accent-indigo-500 rounded cursor-pointer" />
                                <label htmlFor="manualResult" className="font-bold text-sm tracking-wide text-indigo-300 cursor-pointer">
                                    Atur Hasil Pertandingan Secara Manual (Override Simulasi RNG)
                                </label>
                            </div>
                            
                            {isManual && (
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 animate-fade-in mt-4">
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-1">Pemenang</label>
                                        <select className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-indigo-500 text-white font-bold" value={manualWinner} onChange={e=>setManualWinner(e.target.value)}>
                                            <option value="">Pilih...</option>
                                            <option value={f1Id}>Sudut Merah</option>
                                            <option value={f2Id}>Sudut Biru</option>
                                        </select>
                                    </div>
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-1">Metode Akhir</label>
                                        <select className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-indigo-500 text-white" value={manualMethod} onChange={e=>setManualMethod(e.target.value)}>
                                            <option value="KO/TKO">KO/TKO</option>
                                            <option value="Submission">Submission</option>
                                            <option value="Decision (Unanimous)">Decision (Unanimous)</option>
                                            <option value="Decision (Split)">Decision (Split)</option>
                                            <option value="Decision (Majority)">Decision (Majority)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-1">Berakhir Ronde</label>
                                        <input type="number" min="1" max={isTitleFight ? 5 : 3} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-indigo-500 text-white text-center font-bold" value={manualRound} onChange={e=>setManualRound(e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-1">Waktu</label>
                                        <input type="text" placeholder="05:00" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-indigo-500 text-white text-center font-bold" value={manualTime} onChange={e=>setManualTime(e.target.value)} />
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <button 
                        onClick={handleSubmit}
                        disabled={!f1Id || !f2Id || (isManual && !manualWinner)}
                        className="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 disabled:from-slate-800 disabled:to-slate-800 disabled:text-slate-500 disabled:cursor-not-allowed py-4 rounded-xl font-black mt-2 transition-all shadow-lg text-white text-lg tracking-wide"
                    >
                        Simpan Pertandingan
                    </button>
                </div>
            );
        };

        const EventResultModal = ({ event, gameState }) => (
            <div className="p-6 md:p-10">
                <div className="text-center mb-10 pb-6 border-b border-slate-800 relative">
                    <span className="text-[10px] font-black uppercase tracking-widest text-indigo-300 bg-indigo-900/30 border border-indigo-500/30 px-4 py-1.5 rounded-full mb-4 inline-block shadow-lg">Pekan {event.week} • Tahun {event.year}</span>
                    <h2 className="text-3xl md:text-5xl font-black text-white tracking-tight mb-2">{event.name}</h2>
                    <p className="text-emerald-400 font-black tracking-widest text-sm bg-emerald-900/20 inline-block px-4 py-1 rounded-lg border border-emerald-500/20">HASIL RESMI</p>
                </div>
                <div className="space-y-4">
                    {event.matches.map((m, i) => {
                        const f1 = gameState.fighters.find(f => f.id === m.f1Id);
                        const f2 = gameState.fighters.find(f => f.id === m.f2Id);
                        const w = m.result.winnerId === f1.id ? f1 : f2;
                        const l = m.result.winnerId === f1.id ? f2 : f1;
                        
                        const isFotn = event.bonuses?.fotnMatchId === m.id;
                        const isPotn = event.bonuses?.potnWinnerIds?.includes(w.id);

                        return (
                            <div key={m.id} className={`bg-slate-900/80 p-5 rounded-2xl border-l-4 ${isFotn ? 'border-orange-500 shadow-lg shadow-orange-500/10' : 'border-emerald-500'} flex flex-col md:flex-row justify-between items-start md:items-center gap-4 relative overflow-hidden group`}>
                                <div className={`absolute top-0 right-0 w-32 h-32 rounded-bl-full pointer-events-none ${isFotn ? 'bg-orange-500/10' : 'bg-emerald-500/5'}`}></div>
                                <div className="flex-1 z-10 w-full">
                                    <div className="flex flex-wrap items-center gap-2 mb-2">
                                        {i === 0 && event.type !== 'Turnamen' && <span className="text-[10px] font-black bg-red-600/20 text-red-400 px-2.5 py-0.5 rounded border border-red-500/30 tracking-wider">MAIN EVENT</span>}
                                        {m.stageName && <span className="text-[10px] font-black bg-purple-600/20 text-purple-400 px-2.5 py-0.5 rounded border border-purple-500/30 tracking-wider shadow-inner">{m.stageName.toUpperCase()}</span>}
                                        <span className="text-[10px] font-bold text-slate-400 bg-slate-800 px-2.5 py-0.5 rounded uppercase tracking-wider">{m.weightClass}</span>
                                        {m.isTitleFight && <span className="text-[10px] font-black text-amber-400 bg-amber-900/30 px-2.5 py-0.5 rounded tracking-widest border border-amber-500/30">TITLE BOUT</span>}
                                        {isFotn && <span className="text-[10px] font-black text-orange-400 bg-orange-900/30 px-2.5 py-0.5 rounded tracking-widest border border-orange-500/30 flex items-center gap-1"><i data-lucide="flame" className="w-3 h-3"></i> FOTN</span>}
                                    </div>
                                    <p className="font-black text-xl text-white flex items-center gap-2 flex-wrap">
                                        <span className="text-emerald-400">{w.lastName}</span> 
                                        {isPotn && <span className="bg-yellow-500/20 text-yellow-400 text-[9px] px-1.5 py-0.5 rounded uppercase border border-yellow-500/30 font-black tracking-widest inline-flex items-center gap-1" title="Performance of the Night"><i data-lucide="award" className="w-3 h-3"></i> POTN</span>}
                                        <span className="text-sm font-medium text-slate-500 mx-1">def.</span> 
                                        <span className="text-slate-400">{l.lastName}</span>
                                    </p>
                                </div>
                                <div className="text-left md:text-right bg-slate-950 px-5 py-3 rounded-xl border border-slate-800 z-10 w-full md:w-auto shadow-inner">
                                    <p className="text-base font-black text-white">{m.result.method}</p>
                                    <p className="text-[11px] font-bold uppercase tracking-wider text-slate-500 mt-0.5">Ronde {m.result.round} • {m.result.time}</p>
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
