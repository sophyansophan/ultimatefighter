<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ult. Fighter">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <title>Ultimate Fighter - MMA Promoter</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            overflow: hidden; 
        }
        .glass-panel { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        .modal-overlay { 
            background: rgba(2, 6, 23, 0.85); 
            backdrop-filter: blur(5px); 
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Mendaftarkan Service Worker Eksternal untuk update & Offline PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker berhasil didaftarkan pada scope:', registration.scope);
                        
                        // Deteksi jika ada update Service Worker yang tersedia
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('Update baru tersedia!');
                                    // Memaksa halaman memuat ulang secara otomatis di latar belakang untuk mendapatkan versi baru
                                    window.location.reload(); 
                                }
                            });
                        });
                    })
                    .catch(err => console.log('Pendaftaran ServiceWorker gagal: ', err));
            });
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const WEIGHT_CLASSES = ['Ringan', 'Menengah', 'Berat'];
        const FIGHT_STYLES = ['Striker', 'Wrestler', 'BJJ', 'Kickboxer', 'Balanced', 'Muay Thai'];
        const COUNTRIES = ['Indonesia', 'USA', 'Brazil', 'Russia', 'UK', 'Japan', 'Mexico', 'Australia', 'Nigeria', 'France'];
        
        const FIRST_NAMES = ['Budi', 'Agus', 'John', 'Mike', 'Ivan', 'Alex', 'Jose', 'Kenji', 'Tom', 'David', 'Anderson', 'Khabib', 'Conor', 'Israel', 'Kamaru'];
        const LAST_NAMES = ['Santoso', 'Wijaya', 'Smith', 'Johnson', 'Ivanov', 'Silva', 'Gomez', 'Sato', 'Hardy', 'Gane', 'Nurmagomedov', 'McGregor', 'Adesanya', 'Usman'];
        const NICKNAMES = ['The Lion', 'Bones', 'Iron', 'The Assassin', 'Pitbull', 'Flash', 'The Eagle', 'The Notorious', 'Rumble', 'Magic', 'Predator'];

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const randomItem = (arr) => arr[randomInt(0, arr.length - 1)];
        
        const calculateAge = (dob, currentYear) => currentYear - parseInt(dob.split('-')[0]);
        const calculateOvr = (stats) => Math.round((stats.striking + stats.grappling + stats.stamina + stats.power) / 4);
        
        const getOvrColor = (ovr) => {
            if(ovr >= 85) return 'text-amber-400';
            if(ovr >= 75) return 'text-blue-400';
            if(ovr >= 65) return 'text-emerald-400';
            return 'text-slate-400';
        };

        const getInitials = (first, last) => `${first.charAt(0)}${last.charAt(0)}`.toUpperCase();

        const getFighterMomentum = (history) => {
            if (!history || history.length === 0) return 0;
            const last5 = history.slice(-5);
            return last5.reduce((sum, h) => sum + (h.momentumPoints !== undefined ? h.momentumPoints : (h.result === 'W' ? 10 : -5)), 0);
        };

        const generateFighter = (weightClass, isRandom, customData, currentYear) => {
            const id = generateId();
            if (isRandom) {
                const birthYear = currentYear - 18; 
                return {
                    id,
                    firstName: randomItem(FIRST_NAMES),
                    lastName: randomItem(LAST_NAMES),
                    nickname: randomItem(NICKNAMES),
                    country: randomItem(COUNTRIES),
                    dob: `${birthYear}-01-01`,
                    weightClass: weightClass,
                    style: randomItem(FIGHT_STYLES),
                    stats: {
                        striking: randomInt(55, 85),
                        grappling: randomInt(55, 85),
                        stamina: randomInt(60, 85),
                        power: randomInt(55, 90)
                    },
                    record: { wins: 0, losses: 0, draws: 0 },
                    isRetired: false,
                    titleWins: 0,
                    titleDefenses: 0,
                    currentStreak: 0,
                    history: []
                };
            }
            return {
                id,
                ...customData,
                record: { wins: 0, losses: 0, draws: 0 },
                isRetired: false,
                titleWins: 0,
                titleDefenses: 0,
                currentStreak: 0,
                history: []
            };
        };

        const simulateMatch = (f1, f2, isTitleFight) => {
            const score1 = (f1.stats.striking * 0.35) + (f1.stats.grappling * 0.25) + (f1.stats.stamina * 0.2) + (f1.stats.power * 0.2) + randomInt(0, 30);
            const score2 = (f2.stats.striking * 0.35) + (f2.stats.grappling * 0.25) + (f2.stats.stamina * 0.2) + (f2.stats.power * 0.2) + randomInt(0, 30);
            
            let winnerId, loserId, method, round, time;
            const maxRounds = isTitleFight ? 5 : 3;
            
            round = randomInt(1, maxRounds);
            time = `${randomInt(0, 4)}:${randomInt(10, 59).toString().padStart(2, '0')}`;

            if (score1 > score2 + 20) {
                winnerId = f1.id; loserId = f2.id;
                method = f1.stats.power > f1.stats.grappling ? 'KO/TKO' : 'Submission';
            } else if (score2 > score1 + 20) {
                winnerId = f2.id; loserId = f1.id;
                method = f2.stats.power > f2.stats.grappling ? 'KO/TKO' : 'Submission';
            } else {
                winnerId = score1 > score2 ? f1.id : f2.id;
                loserId = score1 > score2 ? f2.id : f1.id;
                
                if (randomInt(0, 100) > 85) {
                    const winner = winnerId === f1.id ? f1 : f2;
                    method = winner.stats.power > winner.stats.grappling ? 'TKO' : 'Submission';
                } else {
                    const decisions = ['Decision (Unanimous)', 'Decision (Split)', 'Decision (Majority)'];
                    method = randomItem(decisions);
                    round = maxRounds;
                    time = '5:00';
                }
            }

            return { winnerId, loserId, method, round, time };
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('roster');
            
            // MENGGUNAKAN LOCAL STORAGE UNTUK MENYIMPAN PROGRES PERMAINAN
            const [gameState, setGameState] = useState(() => {
                const savedData = localStorage.getItem('uf_save_data');
                if (savedData) {
                    try {
                        return JSON.parse(savedData);
                    } catch (e) {
                        console.error('Data tersimpan korup. Memulai ulang permainan baru.', e);
                    }
                }
                // Nilai Default (Game Baru)
                return {
                    currentYear: 2026,
                    currentWeek: 1,
                    ppvCount: 1,
                    fighters: [],
                    events: [],
                    history: [],
                    champions: { 'Ringan': null, 'Menengah': null, 'Berat': null },
                    rankings: { 'Ringan': [], 'Menengah': [], 'Berat': [] } 
                };
            });

            const [modal, setModal] = useState(null); 
            const [toast, setToast] = useState(null);

            // AUTO-SAVE: Menyimpan ke memori setiap kali gameState berubah
            useEffect(() => {
                localStorage.setItem('uf_save_data', JSON.stringify(gameState));
            }, [gameState]);

            useEffect(() => {
                lucide.createIcons();
            }, [activeTab, modal, gameState, toast]);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const addFighter = (fighter) => {
                setGameState(prev => ({ ...prev, fighters: [...prev.fighters, fighter] }));
                showToast('Fighter berhasil ditambahkan!');
                setModal(null);
            };

            const editFighter = (updatedFighter) => {
                setGameState(prev => ({
                    ...prev,
                    fighters: prev.fighters.map(f => f.id === updatedFighter.id ? updatedFighter : f)
                }));
                showToast('Data fighter berhasil diperbarui!');
                setModal({ type: 'fighterDetail', data: updatedFighter });
            };

            const retireFighter = (fighterId) => {
                let isDeleted = false;
                setGameState(prev => {
                    const targetFighter = prev.fighters.find(f => f.id === fighterId);
                    const totalFights = targetFighter.history.length;
                    
                    let newChamps = { ...prev.champions };
                    let newRanks = { ...prev.rankings };

                    if (newChamps[targetFighter.weightClass] === fighterId) {
                        newChamps[targetFighter.weightClass] = null;
                    }
                    newRanks[targetFighter.weightClass] = newRanks[targetFighter.weightClass].filter(id => id !== fighterId);

                    let newFighters;
                    if (totalFights < 5) {
                        newFighters = prev.fighters.filter(f => f.id !== fighterId);
                        isDeleted = true;
                    } else {
                        newFighters = prev.fighters.map(f => f.id === fighterId ? { ...f, isRetired: true } : f);
                    }

                    return { ...prev, fighters: newFighters, champions: newChamps, rankings: newRanks };
                });
                
                setTimeout(() => {
                    if(isDeleted) showToast('Fighter dihapus permanen (< 5 laga).', 'success');
                    else showToast('Fighter resmi gantung sarung tangan.', 'success');
                }, 100);
                
                setModal(null);
            };

            const addEvent = (eventData) => {
                const newEvent = { id: generateId(), ...eventData, matches: [], name: '' };
                setGameState(prev => ({ ...prev, events: [...prev.events, newEvent] }));
                setModal(null);
                showToast('Jadwal acara berhasil dibuat!');
            };

            const deleteEvent = (eventId) => {
                setGameState(prev => ({ ...prev, events: prev.events.filter(e => e.id !== eventId) }));
                showToast('Acara dibatalkan.', 'error');
            };

            const addMatch = (eventId, matchData) => {
                setGameState(prev => {
                    const newEvents = [...prev.events];
                    const eventIndex = newEvents.findIndex(e => e.id === eventId);
                    const evt = newEvents[eventIndex];
                    
                    const newMatch = { id: generateId(), ...matchData, result: null };
                    evt.matches.push(newMatch);

                    if (evt.matches.length === 1) {
                        const f1 = prev.fighters.find(f => f.id === matchData.f1Id);
                        const f2 = prev.fighters.find(f => f.id === matchData.f2Id);
                        if (evt.type === 'Fight Week') {
                            evt.name = `Fight Week ${evt.week} ${evt.year} ${f1.lastName} vs ${f2.lastName}`;
                        } else {
                            evt.name = `Fighter Ultimate ${prev.ppvCount} ${f1.lastName} vs ${f2.lastName}`;
                        }
                    }
                    return { ...prev, events: newEvents };
                });
                setModal(null);
                showToast('Pertandingan berhasil masuk card!');
            };

            const processRankings = (winner, loser, weightClass, isTitleFight, prevRanks, prevChamps, currentFighters) => {
                let newChamps = { ...prevChamps };
                let newRanksList = [...prevRanks[weightClass]];

                if (isTitleFight) {
                    if (winner.id !== prevChamps[weightClass]) {
                        const oldChampId = prevChamps[weightClass];
                        newChamps[weightClass] = winner.id;
                        newRanksList = newRanksList.filter(id => id !== winner.id);
                        if (oldChampId) newRanksList.unshift(oldChampId);
                    }
                } else {
                    const winnerIdx = newRanksList.indexOf(winner.id);
                    let loserIdx = newRanksList.indexOf(loser.id);

                    if (winnerIdx === -1 && loserIdx !== -1) {
                        newRanksList.splice(loserIdx, 0, winner.id);
                    } else if (winnerIdx !== -1 && loserIdx !== -1 && winnerIdx > loserIdx) {
                        newRanksList.splice(winnerIdx, 1);
                        newRanksList.splice(loserIdx, 0, winner.id);
                    } else if (winnerIdx !== -1 && loserIdx !== -1 && winnerIdx < loserIdx) {
                        if (winnerIdx > 0) {
                            const guyAboveId = newRanksList[winnerIdx - 1];
                            const guyAbove = currentFighters.find(f => f.id === guyAboveId);
                            if (guyAbove) {
                                const guyAboveMomentum = getFighterMomentum(guyAbove.history);
                                const winnerMomentum = getFighterMomentum(winner.history);
                                if (guyAboveMomentum < winnerMomentum && guyAboveMomentum < 0) {
                                    newRanksList[winnerIdx - 1] = winner.id;
                                    newRanksList[winnerIdx] = guyAboveId;
                                }
                            }
                        }
                    } else if (winnerIdx === -1 && loserIdx === -1) {
                        if(newRanksList.length < 10 && !newRanksList.includes(winner.id)) {
                            newRanksList.push(winner.id);
                        }
                    }
                }

                let swapped;
                do {
                    swapped = false;
                    for (let i = 0; i < newRanksList.length - 1; i++) {
                        const f1 = currentFighters.find(f => f.id === newRanksList[i]);
                        const f2 = currentFighters.find(f => f.id === newRanksList[i+1]);
                        
                        if (f1 && f2) {
                            const m1 = getFighterMomentum(f1.history);
                            const m2 = getFighterMomentum(f2.history);
                            if (m1 < 0 && m1 < m2) {
                                newRanksList[i] = f2.id;
                                newRanksList[i+1] = f1.id;
                                swapped = true;
                            }
                        }
                    }
                } while (swapped);

                if (newRanksList.length > 10) newRanksList = newRanksList.slice(0, 10);

                newRanksList = newRanksList.filter(id => {
                    const f = currentFighters.find(f => f.id === id);
                    if (!f) return false;
                    const last3 = f.history.slice(-3);
                    const is3Losses = last3.length === 3 && last3.every(h => h.result === 'L');
                    return !is3Losses;
                });

                if (newRanksList.length < 10) {
                    let unrankedFighters = currentFighters.filter(f => {
                        if (f.weightClass !== weightClass || f.isRetired || f.id === newChamps[weightClass] || newRanksList.includes(f.id)) return false;
                        const last3 = f.history.slice(-3);
                        const is3Losses = last3.length === 3 && last3.every(h => h.result === 'L');
                        return !is3Losses;
                    });

                    unrankedFighters.sort((a, b) => {
                        const eloA = (a.record.wins - a.record.losses) + getFighterMomentum(a.history);
                        const eloB = (b.record.wins - b.record.losses) + getFighterMomentum(b.history);
                        return eloB - eloA;
                    });

                    while (newRanksList.length < 10 && unrankedFighters.length > 0) {
                        const topProspect = unrankedFighters.shift();
                        newRanksList.push(topProspect.id);
                    }
                }

                return { champs: newChamps, ranks: { ...prevRanks, [weightClass]: newRanksList } };
            };

            const simulateEvent = (eventId) => {
                let simulatedEvt = null;
                setGameState(prev => {
                    const eventIndex = prev.events.findIndex(e => e.id === eventId);
                    const evt = prev.events[eventIndex];
                    
                    const pendingEarlier = prev.events.some(e => e.id !== eventId && (e.year < evt.year || (e.year === evt.year && e.week < evt.week)));
                    if (pendingEarlier) {
                        showToast("Gagal: Ada acara yang dijadwalkan lebih awal!", 'error');
                        return prev;
                    }

                    if (evt.matches.length === 0) {
                        showToast("Gagal: Card pertandingan masih kosong!", 'error');
                        return prev;
                    }

                    let currentFighters = JSON.parse(JSON.stringify(prev.fighters));
                    let currentChamps = { ...prev.champions };
                    let currentRanks = { ...prev.rankings };

                    const simulatedMatches = evt.matches.map(match => {
                        const f1 = currentFighters.find(f => f.id === match.f1Id);
                        const f2 = currentFighters.find(f => f.id === match.f2Id);
                        
                        const result = match.manualResult ? match.manualResult : simulateMatch(f1, f2, match.isTitleFight);
                        
                        const winner = result.winnerId === f1.id ? f1 : f2;
                        const loser = result.winnerId === f1.id ? f2 : f1;

                        winner.record.wins += 1;
                        winner.currentStreak += 1;
                        loser.record.losses += 1;
                        loser.currentStreak = 0;

                        if (match.isTitleFight) {
                            if (currentChamps[match.weightClass] === winner.id) {
                                winner.titleDefenses += 1;
                            } else {
                                winner.titleWins += 1;
                            }
                        }

                        const getRankIdx = (id, wc) => {
                            if (currentChamps[wc] === id) return -1;
                            const idx = currentRanks[wc].indexOf(id);
                            return idx === -1 ? 999 : idx;
                        };
                        
                        const wRankIdx = getRankIdx(winner.id, match.weightClass);
                        const lRankIdx = getRankIdx(loser.id, match.weightClass);

                        let winnerMomentum = 10; 
                        if (wRankIdx > lRankIdx) winnerMomentum += 7;
                        else if (wRankIdx !== 999 && wRankIdx < lRankIdx) winnerMomentum += 5;

                        if (result.method.includes('KO') || result.method === 'Submission') winnerMomentum += 2;
                        if (result.method === 'Decision (Unanimous)') winnerMomentum += 1;

                        let loserMomentum = -5;
                        if (lRankIdx < wRankIdx) loserMomentum -= 1;
                        if (wRankIdx === 999) loserMomentum -= 2;

                        const fightDesc = `${evt.name} - ${result.method} (R${result.round} - ${result.time})`;
                        winner.history.push({ date: `W${evt.week}-${evt.year}`, opponentId: loser.id, opponentName: loser.lastName, result: 'W', detail: fightDesc, momentumPoints: winnerMomentum });
                        loser.history.push({ date: `W${evt.week}-${evt.year}`, opponentId: winner.id, opponentName: winner.lastName, result: 'L', detail: fightDesc, momentumPoints: loserMomentum });

                        const updatedRankings = processRankings(winner, loser, match.weightClass, match.isTitleFight, currentRanks, currentChamps, currentFighters);
                        currentChamps = updatedRankings.champs;
                        currentRanks = updatedRankings.ranks;

                        return { ...match, result };
                    });

                    let fotnMatchId = null;
                    let potnWinnerIds = [];

                    if (simulatedMatches.length > 0) {
                        const fotnScores = simulatedMatches.map(m => {
                            let score = randomInt(50, 100);
                            if (m.result.method.includes('Decision')) score += 20;
                            if (m.result.round >= 3) score += 15;
                            return { id: m.id, score };
                        });
                        fotnScores.sort((a,b) => b.score - a.score);
                        fotnMatchId = fotnScores[0].id;

                        const potnScores = simulatedMatches.map(m => {
                            let score = randomInt(50, 100);
                            if (m.result.method.includes('KO') || m.result.method.includes('Submission')) {
                                score += (5 - m.result.round) * 25;
                            } else {
                                score -= 40;
                            }
                            return { id: m.result.winnerId, score };
                        });
                        potnScores.sort((a,b) => b.score - a.score);
                        
                        potnWinnerIds.push(potnScores[0].id);
                        if (potnScores.length > 1 && potnScores[1].score > 70) { 
                            potnWinnerIds.push(potnScores[1].id);
                        }
                    }

                    simulatedEvt = { ...evt, matches: simulatedMatches, isSimulated: true, bonuses: { fotnMatchId, potnWinnerIds } };
                    
                    return {
                        ...prev,
                        fighters: currentFighters,
                        champions: currentChamps,
                        rankings: currentRanks,
                        events: prev.events.filter(e => e.id !== eventId),
                        history: [simulatedEvt, ...prev.history],
                        currentWeek: evt.week === 52 ? 1 : evt.week + 1,
                        currentYear: evt.week === 52 ? evt.year + 1 : evt.year,
                        ppvCount: evt.type === 'PPV' ? prev.ppvCount + 1 : prev.ppvCount
                    };
                });
                
                if(simulatedEvt) {
                    showToast('Acara berhasil disimulasikan!');
                    setModal({ type: 'eventResult', data: simulatedEvt });
                }
            };

            const renderSidebar = () => (
                <>
                    <div className="w-64 glass-panel border-r border-slate-700/50 min-h-screen p-5 hidden md:flex flex-col fixed h-full z-10 shadow-2xl">
                        <div className="flex items-center gap-3 mb-10 px-1">
                            <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-cyan-500 rounded-xl flex items-center justify-center font-black text-xl text-white shadow-lg shadow-indigo-500/30">UF</div>
                            <h1 className="text-xl font-black bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Ultimate Fighter</h1>
                        </div>
                        
                        <nav className="flex flex-col gap-2 flex-grow">
                            {[
                                { id: 'roster', icon: 'users', label: 'Roster Fighter' },
                                { id: 'matchmaker', icon: 'calendar', label: 'Matchmaker' },
                                { id: 'rankings', icon: 'bar-chart-2', label: 'Rankings' },
                                { id: 'history', icon: 'clock', label: 'Riwayat Acara' },
                                { id: 'records', icon: 'award', label: 'Hall of Fame' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all duration-300 font-semibold ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-md shadow-indigo-500/25' : 'text-slate-400 hover:bg-slate-800/80 hover:text-white'}`}
                                >
                                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                                    {item.label}
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto pt-5 border-t border-slate-700/50 flex flex-col gap-4">
                            <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 backdrop-blur">
                                <p className="text-xs text-slate-400 mb-1 uppercase tracking-wider font-bold">Waktu Simulasi</p>
                                <p className="font-black text-white flex items-center gap-2 text-lg">
                                    <i data-lucide="calendar-days" className="w-5 h-5 text-indigo-400"></i>
                                    Pekan {gameState.currentWeek}, {gameState.currentYear}
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="md:hidden fixed bottom-0 left-0 right-0 glass-panel border-t border-slate-700/50 z-20 flex justify-around items-center p-2 pb-safe">
                        {[
                            { id: 'roster', icon: 'users' },
                            { id: 'matchmaker', icon: 'calendar' },
